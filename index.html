<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="theme-color" content="#F2EFE9"/>
<title>Propra</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#F2EFE9;color:#0A0A0A;font-family:'Montserrat',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,textarea,select{background:#fff;border:1.5px solid #E8E4DC;color:#0A0A0A;padding:13px 16px;border-radius:12px;font-family:'Montserrat',sans-serif;font-size:15px;font-weight:300;outline:none;width:100%;-webkit-appearance:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:#F5A623;box-shadow:0 0 0 3px rgba(245,166,35,.12)}
.tap{cursor:pointer;transition:opacity .12s,transform .1s;-webkit-tap-highlight-color:transparent}
.tap:active{opacity:.75;transform:scale(.98)}
.fade{animation:fu .2s ease both}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.sheet-box{background:#F2EFE9;border-radius:28px 28px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:0 0 60px;box-shadow:0 -8px 40px rgba(0,0,0,.15)}
.handle{width:36px;height:4px;background:#E5E0D8;border-radius:2px;margin:14px auto 20px}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -4px 24px rgba(0,0,0,.1);border-radius:20px 20px 0 0}

/* Splash */
@keyframes iconDrop{0%{opacity:0;transform:translateY(-18px) scale(.9)}70%{opacity:1;transform:translateY(3px) scale(1.02)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes wordIn{0%{opacity:0;transform:translateX(-10px)}100%{opacity:1;transform:translateX(0)}}
@keyframes tagIn{0%{opacity:0}100%{opacity:1}}
@keyframes barGrow{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h, useState, useEffect, useRef} = React;

// ── COLORS ──
const M="#F5A623",ML="#FFF3DC",MD="#C4831A",BLACK="#0A0A0A";
const CREAM="#F2EFE9",CREAM2="#E8E4DC",WHITE="#FFFFFF";
const GRAY100="#F0EDE6",GRAY200="#E5E0D8",GRAY400="#9A9590",GRAY500="#6B6560";
const GREEN="#2D6A4F",GREENL="#E8F5EE",RED="#C0392B",REDL="#FDECEA";
const CARD_MANGO="#F5A623",CARD_RED="#C0392B",CARD_GREEN="#2D6A4F";
const CARD_BLUE="#2C5F8A",CARD_DARK="#1C1C1E",ORANGEL="#FEF3E8";

// ── SUPABASE ──
const SUPA_URL="https://feducxxoewcztqrwddyi.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZlZHVjeHhvZXdjenRxcndkZHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDEyMjksImV4cCI6MjA5MDMxNzIyOX0.orlTPVn2OpL9mwDlYYgabJzCwbQkfefyRq52HZvpIxI";
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// ── HELPERS ──
const daysUntil = d => d ? Math.ceil((new Date(d)-new Date())/86400000) : null;
const avatar = n => (n||"?").trim().split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();
const getRemStatus = p => {
  const d = daysUntil(p.next_due||p.nextDue);
  if(d===null) return null;
  if(d<0) return {type:"overdue",days:Math.abs(d)};
  if(d<=5) return {type:"soon",days:d};
  return null;
};
const freqLabel = f => ({monthly:"Monthly",weekly:"Weekly",biweekly:"Bi-Weekly",contract:"Contract",nightly:"Nightly"}[f]||f);
const fmt = n => Number(n||0).toLocaleString();

// ── STYLE HELPERS ──
const s = obj => obj;
const card = (extra={}) => ({background:WHITE,borderRadius:22,border:"none",boxShadow:"0 2px 14px rgba(0,0,0,.07)",padding:18,...extra});
const sBtn = (bg,color,extra={}) => ({background:bg,border:"none",borderRadius:16,color,fontFamily:"'Montserrat',sans-serif",fontWeight:700,fontSize:15,padding:"14px 20px",cursor:"pointer",...extra});

// ── SPLASH ──
function Splash({onDone}) {
  useEffect(() => { setTimeout(onDone, 2200); }, []);
  return h("div", {style:{position:"fixed",inset:0,background:BLACK,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:9999}},
    h("style", null, `
      @keyframes iconDrop{0%{opacity:0;transform:translateY(-18px) scale(.9)}70%{opacity:1;transform:translateY(3px) scale(1.02)}100%{opacity:1;transform:translateY(0) scale(1)}}
      @keyframes wordIn{0%{opacity:0;transform:translateX(-10px)}100%{opacity:1;transform:translateX(0)}}
      @keyframes tagIn{0%{opacity:0}100%{opacity:1}}
      @keyframes barGrow{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
    `),
    h("div", {style:{animation:"iconDrop .65s cubic-bezier(.34,1.4,.64,1) .05s both",marginBottom:24}},
      h("div", {style:{width:96,height:96,borderRadius:28,background:BLACK,border:"1px solid rgba(255,255,255,.08)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 22px",boxShadow:"0 0 60px rgba(0,0,0,.9)"}},
        h("svg",{width:54,height:50,viewBox:"0 0 54 50",fill:"none"},
          h("rect",{x:34,y:13,width:5,height:10,rx:2,fill:M}),
          h("path",{d:"M4 26 L27 6 L50 26",stroke:M,strokeWidth:3,strokeLinecap:"round",strokeLinejoin:"round",fill:"none"}),
          h("rect",{x:10,y:25,width:34,height:22,rx:3,fill:M}),
          h("rect",{x:20,y:31,width:14,height:16,rx:3,fill:BLACK}),
          h("circle",{cx:31,cy:39,r:1.5,fill:M}),
          h("rect",{x:12,y:28,width:7,height:7,rx:2,fill:BLACK,opacity:.5}),
          h("rect",{x:35,y:28,width:7,height:7,rx:2,fill:BLACK,opacity:.5})
        )
      ),
      h("div", {style:{display:"flex",alignItems:"baseline",justifyContent:"center",animation:"wordIn .5s ease .5s both"}},
        h("span",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:42,fontWeight:100,color:WHITE,letterSpacing:"-2.5px",lineHeight:1}},"Prop"),
        h("span",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:42,fontWeight:100,color:M,letterSpacing:"-2.5px",lineHeight:1}},"ra")
      )
    ),
    h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:300,color:"rgba(255,255,255,.3)",letterSpacing:4,textTransform:"uppercase",marginBottom:48,animation:"tagIn .6s ease .9s both"}},"Property · Simplified"),
    h("div",{style:{width:56,height:2,background:"rgba(255,255,255,.08)",borderRadius:2,overflow:"hidden"}},
      h("div",{style:{height:"100%",background:M,borderRadius:2,transformOrigin:"left",animation:"barGrow 2s cubic-bezier(.22,1,.36,1) .4s both"}})
    ),
    h("div",{style:{position:"absolute",bottom:42,display:"flex",alignItems:"center",gap:8,animation:"tagIn .5s ease 1.2s both"}},
      h("div",{style:{width:18,height:1,background:"rgba(255,255,255,.15)"}}),
      h("span",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:11,fontWeight:200,color:"rgba(255,255,255,.2)",letterSpacing:3,textTransform:"uppercase"}},"propra.co"),
      h("div",{style:{width:18,height:1,background:"rgba(255,255,255,.15)"}})
    )
  );
}

// ── TOAST ──
function Toast({msg}) {
  return h("div",{style:{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:BLACK,color:WHITE,padding:"12px 24px",borderRadius:50,fontWeight:600,fontSize:13,boxShadow:"0 8px 32px rgba(0,0,0,.25)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:8}},
    h("span",{style:{width:8,height:8,borderRadius:"50%",background:M,flexShrink:0}}),
    msg
  );
}

// ── FIELD ──
function Fld({label,children}) {
  return h("div",{style:{marginBottom:14}},
    label && h("label",{style:{fontSize:10,fontWeight:600,color:GRAY400,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:2}},label),
    children
  );
}

// ── OVERLAY ──
function Overlay({children,onClose}) {
  return h("div",{className:"sheet-overlay",onClick:e=>e.target===e.currentTarget&&onClose()},
    h("div",{className:"sheet-box"},
      h("div",{className:"handle"}),
      h("div",{style:{padding:"0 20px"}},children)
    )
  );
}

// ── EMPTY ──
function Empty() {
  return h("div",{style:{textAlign:"center",padding:"36px 24px",background:"rgba(255,255,255,.7)",borderRadius:20,border:`1.5px dashed ${GRAY200}`,marginBottom:12}},
    h("div",{style:{fontSize:36,marginBottom:8,opacity:.3}},"○"),
    h("div",{style:{fontSize:14,color:GRAY400}}, "Nothing yet — tap + to add.")
  );
}

// ── PILL ──
function Pill({label,bg,color}) {
  return h("span",{className:"pill",style:{background:bg,color:color}},label);
}

const statusStyle = s => ({
  "Resolved":   {bg:GREENL,color:GREEN},
  "In Progress":{bg:ORANGEL,color:"#B45309"},
  "Open":       {bg:REDL,color:RED},
  "Scheduled":  {bg:ML,color:MD},
  "Done":       {bg:GREENL,color:GREEN},
}[s]||{bg:GRAY100,color:GRAY400});

// ── FORM BUTTONS ──
function FormBtns({onSave,onCancel}) {
  return h("div",{style:{display:"flex",gap:10,marginTop:20,paddingBottom:10}},
    h("button",{className:"tap",onClick:onCancel,style:sBtn(CREAM2,BLACK,{flex:1})},"Cancel"),
    h("button",{className:"tap",onClick:onSave,style:sBtn(M,BLACK,{flex:2})},"Save")
  );
}

// ── PROP FORM ──
function PropForm({onSave,onCancel}) {
  const [f,setF] = useState({name:"",address:"",propType:"rental",tenantName:"",phone:"",emailAddr:"",payFreq:"monthly",rentAmount:"",nextDue:"",leaseStart:"",leaseEnd:"",deposit:"",notes:""});
  const u = (k,v) => setF(p=>({...p,[k]:v}));
  const ab = f.propType==="airbnb";
  return h("div",null,
    h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:22,color:BLACK,marginBottom:20}},"New Property"),
    h(Fld,{label:"Property Name"},h("input",{value:f.name,onChange:e=>u("name",e.target.value),placeholder:"e.g. Main St House"})),
    h(Fld,{label:"Address"},h("input",{value:f.address,onChange:e=>u("address",e.target.value)})),
    h(Fld,{label:"Type"},
      h("select",{value:f.propType,onChange:e=>u("propType",e.target.value)},
        h("option",{value:"rental"},"🏠 Long-Term Rental"),
        h("option",{value:"airbnb"},"🏨 Airbnb / Short-Term"),
        h("option",{value:"commercial"},"🏢 Commercial")
      )
    ),
    h(Fld,{label:"Tenant Name"},h("input",{value:f.tenantName,onChange:e=>u("tenantName",e.target.value)})),
    h(Fld,{label:"Phone"},h("input",{type:"tel",value:f.phone,onChange:e=>u("phone",e.target.value)})),
    h(Fld,{label:"Email"},h("input",{type:"email",value:f.emailAddr,onChange:e=>u("emailAddr",e.target.value)})),
    h(Fld,{label:"Payment Frequency"},
      h("select",{value:f.payFreq,onChange:e=>u("payFreq",e.target.value)},
        h("option",{value:"monthly"},"Monthly"),
        h("option",{value:"weekly"},"Weekly"),
        h("option",{value:"biweekly"},"Bi-Weekly"),
        h("option",{value:"contract"},"One-Time Contract"),
        h("option",{value:"nightly"},"Nightly (Airbnb)")
      )
    ),
    h(Fld,{label:"Rent / Rate ($)"},h("input",{type:"number",value:f.rentAmount,onChange:e=>u("rentAmount",e.target.value),placeholder:"0"})),
    !ab && h(Fld,{label:"Next Due Date"},h("input",{type:"date",value:f.nextDue,onChange:e=>u("nextDue",e.target.value)})),
    !ab && h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h(Fld,{label:"Lease Start"},h("input",{type:"date",value:f.leaseStart,onChange:e=>u("leaseStart",e.target.value)})),
      h(Fld,{label:"Lease End"},h("input",{type:"date",value:f.leaseEnd,onChange:e=>u("leaseEnd",e.target.value)}))
    ),
    h(Fld,{label:"Security Deposit ($)"},h("input",{type:"number",value:f.deposit,onChange:e=>u("deposit",e.target.value),placeholder:"0"})),
    h(Fld,{label:"Notes"},h("textarea",{rows:2,value:f.notes,onChange:e=>u("notes",e.target.value),style:{resize:"none"}})),
    h(FormBtns,{onSave:()=>onSave({...f,rentAmount:Number(f.rentAmount),deposit:Number(f.deposit)}),onCancel})
  );
}

// ── REPAIR FORM ──
function RepairForm({props_,onSave,onCancel}) {
  const works = ["Plumbing","Electrical","HVAC","Roof","Paint","Appliance","Pest Control","Cleaning","Structural","Locks","Other"];
  const [f,setF] = useState({propId:"",date:new Date().toISOString().split("T")[0],type:"",description:"",cost:"",status:"Open",contractor:""});
  const u = (k,v) => setF(p=>({...p,[k]:v}));
  return h("div",null,
    h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:22,color:BLACK,marginBottom:20}},"Log Repair"),
    h(Fld,{label:"Property"},
      h("select",{value:f.propId,onChange:e=>u("propId",Number(e.target.value))},
        h("option",{value:""},"Select property..."),
        ...props_.map(p=>h("option",{key:p.id,value:p.id},p.name))
      )
    ),
    h(Fld,{label:"Type of Work"},
      h("select",{value:f.type,onChange:e=>u("type",e.target.value)},
        h("option",{value:""},"Select type..."),
        ...works.map(w=>h("option",{key:w,value:w},w))
      )
    ),
    h(Fld,{label:"Description"},h("textarea",{rows:3,value:f.description,onChange:e=>u("description",e.target.value),placeholder:"What happened?",style:{resize:"none"}})),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h(Fld,{label:"Date"},h("input",{type:"date",value:f.date,onChange:e=>u("date",e.target.value)})),
      h(Fld,{label:"Cost ($)"},h("input",{type:"number",value:f.cost,onChange:e=>u("cost",e.target.value),placeholder:"0"}))
    ),
    h(Fld,{label:"Contractor"},h("input",{value:f.contractor,onChange:e=>u("contractor",e.target.value),placeholder:"Contractor name"})),
    h(Fld,{label:"Status"},
      h("select",{value:f.status,onChange:e=>u("status",e.target.value)},
        h("option",{value:"Open"},"Open"),
        h("option",{value:"In Progress"},"In Progress"),
        h("option",{value:"Resolved"},"Resolved"),
        h("option",{value:"Scheduled"},"Scheduled")
      )
    ),
    h(FormBtns,{onSave:()=>onSave({...f,cost:Number(f.cost)}),onCancel})
  );
}

// ── TASK FORM ──
function TaskForm({props_,onSave,onCancel}) {
  const cats = ["Paint","Filters","HVAC Service","Roof Inspection","Landscaping","Deep Clean","Pest Control","Safety Check","Plumbing","Electrical","Other"];
  const [f,setF] = useState({propId:"",task:"",category:"",dueDate:"",priority:"Medium",estimatedCost:""});
  const u = (k,v) => setF(p=>({...p,[k]:v}));
  return h("div",null,
    h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:22,color:BLACK,marginBottom:20}},"Add Task"),
    h(Fld,{label:"Property"},
      h("select",{value:f.propId,onChange:e=>u("propId",Number(e.target.value))},
        h("option",{value:""},"Select..."),
        ...props_.map(p=>h("option",{key:p.id,value:p.id},p.name))
      )
    ),
    h(Fld,{label:"Task Description"},h("input",{value:f.task,onChange:e=>u("task",e.target.value),placeholder:"e.g. Replace air filter"})),
    h(Fld,{label:"Category"},
      h("select",{value:f.category,onChange:e=>u("category",e.target.value)},
        h("option",{value:""},"Select..."),
        ...cats.map(c=>h("option",{key:c,value:c},c))
      )
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
      h(Fld,{label:"Due Date"},h("input",{type:"date",value:f.dueDate,onChange:e=>u("dueDate",e.target.value)})),
      h(Fld,{label:"Priority"},
        h("select",{value:f.priority,onChange:e=>u("priority",e.target.value)},
          h("option",{value:"High"},"High"),
          h("option",{value:"Medium"},"Medium"),
          h("option",{value:"Low"},"Low")
        )
      )
    ),
    h(Fld,{label:"Est. Cost ($)"},h("input",{type:"number",value:f.estimatedCost,onChange:e=>u("estimatedCost",e.target.value),placeholder:"0"})),
    h(FormBtns,{onSave:()=>onSave({...f,estimatedCost:Number(f.estimatedCost)}),onCancel})
  );
}

// ── MSG FORM ──
function MsgForm({prop,onSend,onCancel}) {
  const [text,setText] = useState("");
  const name = prop.tenant_name||prop.tenantName||prop.name||"";
  const amt = prop.rent_amount||prop.rentAmount||"";
  const tmpls = [
    {l:"Rent Reminder",v:`Hi ${name}, your payment of $${amt} is due soon. Please pay on time. Thank you.`},
    {l:"Late Notice",v:`Hi ${name}, your payment of $${amt} is overdue. Please pay immediately.`},
    {l:"Maintenance",v:`Hi ${name}, our team will visit soon for pending maintenance.`},
    {l:"5-Day Warning",v:`Hi ${name}, heads up — your payment of $${amt} is due in 5 days.`},
  ];
  return h("div",null,
    h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontWeight:700,fontSize:20,color:BLACK,marginBottom:4}},"💬 Message"),
    h("div",{style:{fontSize:13,color:GRAY400,marginBottom:16}},"To: "+name),
    h("div",{style:{fontSize:10,fontWeight:700,color:GRAY400,textTransform:"uppercase",letterSpacing:1,marginBottom:8}},"Templates"),
    h("div",{style:{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}},
      ...tmpls.map(tp=>h("button",{key:tp.l,className:"tap",onClick:()=>setText(tp.v),
        style:{padding:"7px 13px",borderRadius:50,border:`1.5px solid ${GRAY200}`,background:WHITE,color:GRAY500,fontSize:12,fontWeight:600,fontFamily:"'Montserrat',sans-serif"}},tp.l))
    ),
    h("textarea",{value:text,onChange:e=>setText(e.target.value),placeholder:"Write your message...",style:{minHeight:120,resize:"none",marginBottom:14,fontSize:15}}),
    h("div",{style:{display:"flex",gap:10,paddingBottom:10}},
      h("button",{className:"tap",onClick:onCancel,style:sBtn(CREAM2,BLACK,{flex:1})},"Cancel"),
      h("button",{className:"tap",onClick:()=>onSend(text),style:sBtn(M,BLACK,{flex:2})},"📤 Send")
    )
  );
}

// ── LANDING ──
function Landing({onL,onT,lang,toggleLang}) {
  const [tab,setTab] = useState("rentals");
  return h("div",{style:{background:CREAM,minHeight:"100vh",paddingBottom:40}},
    // Nav
    h("div",{style:{background:CREAM,padding:"16px 22px",display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 2px 16px rgba(0,0,0,.04)"}},
      h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:15,fontWeight:200,color:BLACK,letterSpacing:"6px",textTransform:"uppercase"}},"PROPRA"),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{className:"tap",onClick:toggleLang,style:{background:GRAY100,border:"none",color:GRAY500,padding:"7px 12px",borderRadius:50,fontSize:12,fontWeight:600,fontFamily:"'Montserrat',sans-serif"}},"🌐"),
        h("button",{className:"tap",onClick:onL,style:sBtn(BLACK,WHITE,{padding:"9px 20px",borderRadius:50,fontSize:13,boxShadow:"0 2px 12px rgba(0,0,0,.2)"})},"Sign In")
      )
    ),
    h("div",{style:{padding:"24px 22px 0"}},
      // Hero
      h("div",{style:{background:M,borderRadius:24,padding:"30px 26px 28px",position:"relative",overflow:"hidden",marginBottom:24}},
        h("div",{style:{position:"absolute",top:-30,right:-30,width:140,height:140,borderRadius:"50%",background:"rgba(255,255,255,.15)"}}),
        h("div",{style:{fontSize:10,fontWeight:800,letterSpacing:3,textTransform:"uppercase",color:"rgba(0,0,0,.45)",marginBottom:10}},lang==="en"?"Property Management, Simplified":"Administración de Propiedades"),
        h("h1",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:30,fontWeight:800,lineHeight:1.15,color:BLACK,marginBottom:12}},
          lang==="en"?"Manage smarter,\nearn better.":"Administra mejor,\ngana más."
        ),
        h("p",{style:{fontSize:14,color:"rgba(0,0,0,.55)",lineHeight:1.6,marginBottom:20}},lang==="en"?"Rentals, Airbnb & repairs in one clean app.":"Rentas, Airbnb y reparaciones en una app."),
        h("div",{style:{display:"flex",gap:10}},
          h("button",{className:"tap",onClick:onL,style:sBtn(BLACK,WHITE,{flex:1,borderRadius:14,padding:13,fontSize:14})},"🏠 "+(lang==="en"?"Landlord":"Propietario")),

// ── LOGIN ──
function Login({role,onBack,lang,toggleLang}) {
  const [email,setEmail] = useState("");
  const [pass,setPass] = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError] = useState("");
  const [isSignup,setIsSignup] = useState(false);
  const isL = role==="l";

  const handleAuth = async () => {
    if(!email||!pass){setError("Enter email and password");return;}
    setLoading(true);setError("");
    try {
      if(isSignup) {
        const {error:e} = await sb.auth.signUp({email,password:pass});
        if(e) setError(e.message);
        else setError("✓ Check your email to confirm signup");
      } else {
        const {error:e} = await sb.auth.signInWithPassword({email,password:pass});
        if(e) setError("Invalid email or password");
      }
    } catch(e){setError("Error — try again");}
    setLoading(false);
  };

  const isSuccess = error.startsWith("✓");

  return h("div",{style:{minHeight:"100vh",background:CREAM,display:"flex",flexDirection:"column",padding:"0 22px 40px"}},
    h("div",{style:{paddingTop:22,marginBottom:40}},
      h("button",{className:"tap",onClick:onBack,style:{background:"none",border:"none",color:GRAY400,fontSize:14,fontWeight:500,padding:0,fontFamily:"'Montserrat',sans-serif"}},"← Back")
    ),
    h("div",{style:{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}},
      h("div",{style:{marginBottom:36}},
        h("div",{style:{width:64,height:64,borderRadius:20,background:isL?BLACK:M,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,marginBottom:20,boxShadow:"0 4px 20px rgba(0,0,0,.15)}}"}},(isL?"🏠":"👤")),
        h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:28,fontWeight:800,color:BLACK,marginBottom:4}},isSignup?"Create Account":"Welcome back"),
        h("div",{style:{fontSize:14,color:GRAY400,fontWeight:400}},isL?"Landlord":"Tenant")
      ),
      h(Fld,{label:"Email"},h("input",{type:"email",value:email,onChange:e=>setEmail(e.target.value),placeholder:"your@email.com"})),
      h(Fld,{label:"Password"},h("input",{type:"password",value:pass,onChange:e=>setPass(e.target.value),placeholder:"••••••••",onKeyDown:e=>e.key==="Enter"&&handleAuth()})),
      error && h("div",{style:{background:isSuccess?GREENL:REDL,color:isSuccess?GREEN:RED,padding:"12px 16px",borderRadius:12,fontSize:13,marginBottom:12,fontWeight:500}},error),
      h("div",{style:{height:8}}),
      h("button",{className:"tap",onClick:handleAuth,disabled:loading,style:{...sBtn(isL?BLACK:M,isL?WHITE:BLACK),width:"100%",padding:17,fontSize:16,opacity:loading?.7:1}},
        loading?"Loading...":(isSignup?"Create Account →":"Sign In →")
      ),
      h("div",{style:{textAlign:"center",marginTop:16}},
        h("button",{className:"tap",onClick:()=>{setIsSignup(!isSignup);setError("");},style:{background:"none",border:"none",color:GRAY400,fontSize:13,fontFamily:"'Montserrat',sans-serif"}},
          isSignup?"Already have account? Sign in":"No account? Sign up free"
        )
      )
    ),
    h("button",{className:"tap",onClick:toggleLang,style:{background:"none",border:"none",color:GRAY400,fontSize:13,textAlign:"center",marginTop:20,fontFamily:"'Montserrat',sans-serif"}},"🌐 "+(lang==="en"?"Español":"English"))
  );
}

            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:10,borderTop:`1px solid ${GRAY100}`}},
              h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontWeight:700,fontSize:18,color:BLACK}},m.cost>0?"$"+fmt(m.cost):"—"),
              m.status!=="Resolved" && h("button",{className:"tap",onClick:()=>resolve(m.id),style:sBtn(GREENL,GREEN,{padding:"8px 16px",borderRadius:10,fontSize:13})},"✓ Resolve")
            )
          );
        })
      )
    );
  };

  // TASKS TAB
  const TasksTab = () => h("div",{className:"fade"},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px 18px"}},
      h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:700,color:BLACK}},"☑ Tasks"),
      h("button",{className:"tap",onClick:()=>setSheet("addTask"),style:sBtn(BLACK,WHITE,{padding:"10px 18px",borderRadius:50,fontSize:13})},"+ Add")
    ),
    tasks.length===0 && h(Empty),
    h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      ...tasks.slice().sort((a,b)=>new Date(a.due_date||a.dueDate||0)-new Date(b.due_date||b.dueDate||0)).map(tk=>{
        const done=tk.status==="Done";
        const p=props_.find(x=>x.id===(tk.prop_id||tk.propId));
        const prioColor=({High:RED,Medium:"#D97706",Low:GREEN})[tk.priority]||GRAY400;
        return h("div",{key:tk.id,style:{...card(),opacity:done?.5:1}},
          h("div",{style:{display:"flex",alignItems:"flex-start",gap:12}},
            h("div",{className:"tap",onClick:async()=>{
              if(!done){
                await sb.from("tasks").update({status:"Done"}).eq("id",tk.id);
                notify("Task done ✓");
              }
            },style:{width:22,height:22,borderRadius:6,border:`2px solid ${done?GREEN:GRAY200}`,background:done?GREEN:WHITE,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer"}},
              done && h("span",{style:{color:WHITE,fontSize:13,fontWeight:800}},"✓")
            ),
            h("div",{style:{flex:1}},
              h("div",{style:{fontWeight:600,fontSize:15,color:BLACK,textDecoration:done?"line-through":"none"}},tk.task),
              h("div",{style:{fontSize:12,color:GRAY400,marginTop:2}},(p?.name||"")+(tk.due_date||tk.dueDate?" · "+(tk.due_date||tk.dueDate):"")),
              h("div",{style:{display:"flex",gap:8,marginTop:8,alignItems:"center"}},
                h("span",{style:{fontSize:11,fontWeight:700,color:prioColor,background:GRAY100,padding:"3px 9px",borderRadius:20}},tk.priority),
                (tk.estimated_cost||tk.estimatedCost)>0 && h("span",{style:{fontSize:13,fontWeight:700,color:GRAY500}},"$"+fmt(tk.estimated_cost||tk.estimatedCost))
              )
            )
          )
        );
      })
    )
  );

  // MORE TAB
  const MoreTab = () => h("div",{className:"fade"},
    h("div",{style:{padding:"4px 4px 18px",fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:700,color:BLACK}},"···"),
    h("div",{style:{...card(),overflow:"hidden",marginBottom:12}},
      h("button",{className:"tap",onClick:toggleLang,style:{width:"100%",padding:"16px 18px",background:"none",border:"none",color:BLACK,fontSize:15,textAlign:"left",borderBottom:`1px solid ${GRAY100}`,display:"flex",alignItems:"center",gap:12,fontFamily:"'Montserrat',sans-serif",fontWeight:500}},"🌐 "+(lang==="en"?"Español":"English")),
      h("button",{className:"tap",onClick:handleLogout,style:{width:"100%",padding:"16px 18px",background:"none",border:"none",color:RED,fontSize:15,textAlign:"left",display:"flex",alignItems:"center",gap:12,fontFamily:"'Montserrat',sans-serif",fontWeight:500}},"↩ Sign Out")
    ),
    // Tenants list
    h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontSize:16,fontWeight:700,color:BLACK,marginBottom:12}},"👥 Tenants"),
    props_.length===0 && h(Empty),
    h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      ...props_.map(p=>h("div",{key:p.id,style:{...card()}},
        h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:14}},
          h("div",{style:{width:48,height:48,borderRadius:"50%",background:ML,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:MD,flexShrink:0}},avatar(p.tenant_name||p.tenantName)),
          h("div",null,
            h("div",{style:{fontWeight:700,fontSize:16,color:BLACK}},(p.tenant_name||p.tenantName)||"—"),
            h("div",{style:{fontSize:12,color:GRAY400}},p.name)
          )
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{className:"tap",onClick:()=>setSheet({type:"msg",prop:p}),style:sBtn(BLACK,WHITE,{flex:1,borderRadius:12,padding:11,fontSize:14})},"💬 Message"),
          h("button",{className:"tap",onClick:()=>notify("Calling "+(p.tenant_name||p.name)+"..."),style:sBtn(GRAY100,BLACK,{flex:1,borderRadius:12,padding:11,fontSize:14,border:`1px solid ${GRAY200}`})},"📞 Call")
        )
      ))
    )
  );

  // DOCS SHEET
  const DocsSheetComp = ({prop}) => {
    const [adding,setAdding] = useState(false);
    const [f,setF] = useState({name:"",type:"lease",notes:"",date:new Date().toISOString().split("T")[0],expiry:""});
    const u = (k,v) => setF(p=>({...p,[k]:v}));
    const propDocs = docs.filter(d=>d.prop_id===prop.id||d.propId===prop.id);
    const DOC_TYPES = {
      lease:{icon:"📋",label:"Lease",color:GREEN,bg:GREENL},
      insurance:{icon:"🛡",label:"Insurance",color:"#1D4ED8",bg:"#EFF6FF"},
      inspection:{icon:"🔍",label:"Inspection",color:"#7C3AED",bg:"#F5F3FF"},
      permit:{icon:"📜",label:"Permit",color:"#B45309",bg:ORANGEL},
      photo:{icon:"📷",label:"Photos",color:"#0F766E",bg:"#F0FDFA"},
      tax:{icon:"🧾",label:"Tax Doc",color:RED,bg:REDL},
      other:{icon:"📎",label:"Other",color:GRAY500,bg:GRAY100},
    };
    return h("div",null,
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}},
        h("div",null,
          h("div",{style:{fontFamily:"'Montserrat',sans-serif",fontWeight:700,fontSize:20,color:BLACK}},"Documents"),
          h("div",{style:{fontSize:12,color:GRAY400,marginTop:3}},prop.name)
        ),
        h("span",{className:"pill",style:{background:GRAY100,color:GRAY500}},propDocs.length+" files")
      ),
      !adding && h("button",{className:"tap",onClick:()=>setAdding(true),style:{...sBtn(BLACK,WHITE),width:"100%",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"center",gap:10}},
        h("span",{style:{fontSize:20,fontWeight:200}},"+"),"Add Document"
      ),
      adding && h("div",{style:{background:WHITE,borderRadius:20,padding:18,marginBottom:16,boxShadow:`0 0 0 2px ${M}`}},
        h("div",{style:{fontWeight:700,fontSize:16,color:BLACK,marginBottom:14}},"New Document"),
        h(Fld,{label:"Document Name"},h("input",{value:f.name,onChange:e=>u("name",e.target.value),placeholder:"e.g. Lease Agreement 2025"})),
        h(Fld,{label:"Type"},
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
            ...Object.entries(DOC_TYPES).map(([k,v])=>h("button",{key:k,className:"tap",onClick:()=>u("type",k),style:{padding:"10px 12px",borderRadius:12,border:`1.5px solid ${f.type===k?v.color:GRAY200}`,background:f.type===k?v.bg:WHITE,color:f.type===k?v.color:GRAY400,fontSize:12,fontWeight:f.type===k?700:400,fontFamily:"'Montserrat',sans-serif",display:"flex",alignItems:"center",gap:6,textAlign:"left"}},v.icon+" "+v.label))
          )
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
          h(Fld,{label:"Date"},h("input",{type:"date",value:f.date,onChange:e=>u("date",e.target.value)})),
          h(Fld,{label:"Expiry"},h("input",{type:"date",value:f.expiry,onChange:e=>u("expiry",e.target.value)}))
        ),
        h(Fld,{label:"Notes"},h("textarea",{rows:2,value:f.notes,onChange:e=>u("notes",e.target.value),placeholder:"Policy number, renewal info...",style:{resize:"none"}})),
        h("div",{style:{display:"flex",gap:10}},
          h("button",{className:"tap",onClick:()=>setAdding(false),style:sBtn(CREAM2,BLACK,{flex:1})},"Cancel"),
          h("button",{className:"tap",onClick:()=>{if(!f.name.trim())return;addDoc({...f,propId:prop.id});setAdding(false);setF({name:"",type:"lease",notes:"",date:new Date().toISOString().split("T")[0],expiry:""});},style:sBtn(M,BLACK,{flex:2})},"Save Document")
        )
      ),
      propDocs.length===0&&!adding && h("div",{style:{textAlign:"center",padding:"40px 20px",background:"rgba(255,255,255,.7)",borderRadius:16,border:`1.5px dashed ${GRAY200}`}},
        h("div",{style:{fontSize:40,marginBottom:10,opacity:.2}},"📄"),
        h("div",{style:{fontSize:13,color:GRAY400,lineHeight:1.6}},"Add leases, insurance, inspection reports and more")
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        ...propDocs.map(doc=>{
          const dt=DOC_TYPES[doc.type]||DOC_TYPES.other;
          const expD=doc.expiry?Math.ceil((new Date(doc.expiry)-new Date())/86400000):null;
          const expired=expD!==null&&expD<0;
          const expiring=expD!==null&&expD>=0&&expD<=30;
          return h("div",{key:doc.id,style:{background:WHITE,border:"none",boxShadow:"0 2px 14px rgba(0,0,0,.07)",borderRadius:20,padding:16,position:"relative",overflow:"hidden"}},
            h("div",{style:{position:"absolute",left:0,top:0,bottom:0,width:3,background:dt.color,borderRadius:"3px 0 0 3px"}}),
            h("div",{style:{display:"flex",gap:12,alignItems:"flex-start",paddingLeft:8}},
              h("div",{style:{width:44,height:44,borderRadius:13,background:dt.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}},dt.icon),
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{fontWeight:600,fontSize:15,color:BLACK,marginBottom:2}},doc.name),
                h("div",{style:{fontSize:11,color:dt.color,fontWeight:600,marginBottom:4}},dt.label),
                doc.expiry && h("div",{style:{marginBottom:6}},
                  expired
                    ? h("span",{className:"pill",style:{background:REDL,color:RED}},"⚠ Expired · "+doc.expiry)
                    : expiring
                      ? h("span",{className:"pill",style:{background:ML,color:MD}},"🔔 Expires · "+doc.expiry)
                      : h("span",{className:"pill",style:{background:GREENL,color:GREEN}},"✓ Valid until "+doc.expiry)
                ),
                doc.notes && h("div",{style:{fontSize:12,color:GRAY500,lineHeight:1.5}},doc.notes)
              ),
              h("button",{className:"tap",onClick:()=>deleteDoc(doc.id),style:{background:"none",border:"none",color:GRAY200,fontSize:20,padding:4,flexShrink:0,lineHeight:1,cursor:"pointer"}},"×")
            )
          );
        })
      )
    );
  };

  return h("div",{style:{minHeight:"100vh",background:CREAM,paddingBottom:80}},
    h(Header),
    h("div",{style:{padding:"16px 16px 0"}},
      tab==="home"   && h(HomeTab),
      tab==="props"  && h(PropsTab),
      tab==="repair" && h(RepairsTab),
      tab==="tasks"  && h(TasksTab),
      tab==="more"   && h(MoreTab)
    ),
    h(NavBar),
    // Sheets
    sheet==="addProp"   && h(Overlay,{onClose:()=>setSheet(null)},h(PropForm,{onSave:addProp,onCancel:()=>setSheet(null)})),
    sheet==="addRepair" && h(Overlay,{onClose:()=>setSheet(null)},h(RepairForm,{props_,onSave:addMaint,onCancel:()=>setSheet(null)})),
    sheet==="addTask"   && h(Overlay,{onClose:()=>setSheet(null)},h(TaskForm,{props_,onSave:addTask,onCancel:()=>setSheet(null)})),
    sheet&&typeof sheet==="object"&&sheet.type==="docs" && h(Overlay,{onClose:()=>setSheet(null)},h(DocsSheetComp,{prop:sheet.prop})),
    sheet&&typeof sheet==="object"&&sheet.type==="msg"  && h(Overlay,{onClose:()=>setSheet(null)},h(MsgForm,{prop:sheet.prop,onSend:m=>{notify("Message sent ✓");setSheet(null);},onCancel:()=>setSheet(null)}))
  );
}

// ── APP ──
function App() {
  const [screen,setScreen] = useState("splash");
  const [lang,setLang] = useState("en");
  const [toast,setToast] = useState(null);
  const [user,setUser] = useState(null);
  const [props_,setProps] = useState([]);
  const [maint,setMaint] = useState([]);
  const [tasks,setTasks] = useState([]);
  const [docs,setDocs] = useState([]);

  const notify = msg => { setToast(msg); setTimeout(()=>setToast(null),3000); };
  const toggleLang = () => setLang(l=>l==="en"?"es":"en");

  const loadAll = async uid => {
    const [p,r,tk,d] = await Promise.all([
      sb.from("properties").select("*").eq("user_id",uid).order("created_at"),
      sb.from("repairs").select("*").eq("user_id",uid).order("created_at"),
      sb.from("tasks").select("*").eq("user_id",uid).order("created_at"),
      sb.from("documents").select("*").eq("user_id",uid).order("created_at"),
    ]);
    if(p.data) setProps(p.data);
    if(r.data) setMaint(r.data);
    if(tk.data) setTasks(tk.data);
    if(d.data) setDocs(d.data);
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user);loadAll(session.user.id);setScreen("landlord");}
      else setScreen("landing");
    }).catch(()=>setScreen("landing"));

    const {data:{subscription}} = sb.auth.onAuthStateChange((event,session)=>{
      if(event==="SIGNED_IN"&&session?.user){setUser(session.user);loadAll(session.user.id);setScreen("landlord");}
      else if(event==="SIGNED_OUT"){setUser(null);setProps([]);setMaint([]);setTasks([]);setDocs([]);setScreen("landing");}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  // CRUD
  const addProp = async d => {
    const {data,error} = await sb.from("properties").insert([{user_id:user.id,name:d.name,address:d.address,prop_type:d.propType,tenant_name:d.tenantName,phone:d.phone,email:d.emailAddr,pay_freq:d.payFreq,rent_amount:d.rentAmount,next_due:d.nextDue||null,lease_start:d.leaseStart||null,lease_end:d.leaseEnd||null,deposit:d.deposit,notes:d.notes}]).select().single();
    if(!error&&data){setProps(p=>[...p,data]);notify("Property added ✓");}
    else notify("Error saving — try again");
  };
  const addMaint = async d => {
    const {data,error} = await sb.from("repairs").insert([{user_id:user.id,prop_id:d.propId||null,type:d.type,description:d.description,cost:d.cost,status:d.status,contractor:d.contractor,date:d.date||null}]).select().single();
    if(!error&&data){setMaint(m=>[...m,data]);notify("Repair logged ✓");}
    else notify("Error saving — try again");
  };
  const addTask = async d => {
    const {data,error} = await sb.from("tasks").insert([{user_id:user.id,prop_id:d.propId||null,task:d.task,category:d.category,due_date:d.dueDate||null,priority:d.priority,estimated_cost:d.estimatedCost,status:"Pending"}]).select().single();
    if(!error&&data){setTasks(tk=>[...tk,data]);notify("Task added ✓");}
    else notify("Error saving — try again");
  };
  const addDoc = async d => {
    const {data,error} = await sb.from("documents").insert([{user_id:user.id,prop_id:d.propId||null,name:d.name,type:d.type,notes:d.notes,date:d.date||null,expiry:d.expiry||null}]).select().single();
    if(!error&&data){setDocs(x=>[...x,data]);notify("Document saved ✓");}
    else notify("Error saving — try again");
  };
  const deleteDoc = async id => { await sb.from("documents").delete().eq("id",id); setDocs(x=>x.filter(d=>d.id!==id)); };
  const resolve = async id => { await sb.from("repairs").update({status:"Resolved"}).eq("id",id); setMaint(m=>m.map(r=>r.id===id?{...r,status:"Resolved"}:r)); notify("Resolved ✓"); };
  const sendRem = p => notify("Reminder sent to "+(p.tenant_name||p.tenantName||p.name)+" ✓");

  return h("div",{style:{fontFamily:"'Montserrat',sans-serif",minHeight:"100vh",background:CREAM,color:BLACK,maxWidth:480,margin:"0 auto",position:"relative"}},
    toast && h(Toast,{msg:toast}),
    screen==="splash"   && h(Splash,{onDone:null}),
    screen==="landing"  && h(Landing,{onL:()=>setScreen("login-l"),onT:()=>setScreen("login-t"),lang,toggleLang}),
    screen==="login-l"  && h(Login,{role:"l",onBack:()=>setScreen("landing"),lang,toggleLang}),
    screen==="login-t"  && h(Login,{role:"t",onBack:()=>setScreen("landing"),lang,toggleLang}),
    screen==="landlord" && h(Landlord,{user,props_,maint,tasks,docs,notify,addProp,addMaint,addTask,addDoc,deleteDoc,resolve,sendRem,lang,toggleLang})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
