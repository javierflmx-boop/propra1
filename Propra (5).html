<style>
  :root {
    --mango: #F5A623;
    --mango-light: #FFF3DC;
    --mango-dark: #C4831A;
    --black: #0A0A0A;
    --gray-900: #111111;
    --gray-800: #1C1C1C;
    --gray-700: #2E2E2E;
    --gray-500: #6B6B6B;
    --gray-400: #9A9A9A;
    --gray-200: #E5E5E5;
    --gray-100: #F2F2F2;
    --gray-50: #F8F8F8;
    --white: #FFFFFF;
    --red: #E53E3E;
    --green: #2D7D46;
    --green-light: #E6F4EC;
    --red-light: #FEF0F0;
    --orange: #D97706;
    --orange-light: #FFF7E6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--white); color: var(--black); font-family: 'Montserrat', sans-serif; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { display: none; }
  input, textarea, select {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    color: var(--black);
    padding: 13px 16px;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 300;
    outline: none; letter-spacing: 0.01em;
    width: 100%;
    -webkit-appearance: none;
    transition: border-color .2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--mango); box-shadow: 0 0 0 3px rgba(245,166,35,0.12); }
  option { background: var(--white); color: var(--black); }
  .tap { cursor: pointer; transition: opacity .12s, transform .1s; -webkit-tap-highlight-color: transparent; }
  .tap:active { opacity: .75; transform: scale(.98); }
  .fade { animation: fu .2s ease both; }
  @keyframes fu { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:flex; align-items:flex-end; backdrop-filter: blur(4px); }
  .sheet-box { background:var(--white); border-radius:24px 24px 0 0; width:100%; max-height:93vh; overflow-y:auto; padding:0 0 60px; box-shadow: 0 -8px 40px rgba(0,0,0,.12); }
  .handle { width:36px; height:4px; background:var(--gray-200); border-radius:2px; margin:14px auto 20px; }
  .pill { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; }
  .nav-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--white); border-top:1px solid var(--gray-100); display:flex; z-index:50; padding-bottom:env(safe-area-inset-bottom); box-shadow: 0 -4px 20px rgba(0,0,0,.06); }
  .card { background:var(--white); border:1.5px solid var(--gray-100); border-radius:16px; }
  .card-dark { background:var(--black); border-radius:16px; }
  .section-title { font-family:'Montserrat',sans-serif; font-size:22px; font-weight:800; color:var(--black); }
  .label { font-size:11px; font-weight:600; color:var(--gray-400); text-transform:uppercase; letter-spacing:1px; }
</style>
</head>

const daysUntil = d => d ? Math.ceil((new Date(d) - new Date()) / 86400000) : null;
const getRemStatus = p => {
  const d = daysUntil(p.nextDue);
  if (d === null) return null;
  if (d < 0) return { type:"overdue", days: Math.abs(d) };
  if (d <= 5) return { type:"soon", days: d };
  return null;
};

}[f] || f);

function App() {
  const [screen, setScreen] = useState("splash");
  const [splashOut, setSplashOut] = useState(false);
  const [lang, setLang] = useState("en");
  const [toast, setToast] = useState(null);
  const [props_, setProps] = useState([]);
  const [maint, setMaint] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [pays, setPays] = useState([]);
  const t = T[lang];
  const notify = msg => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  useEffect(() => {
    // Hide the static HTML splash once React is ready
    const el = document.getElementById("static-splash");
    if (el) {
      setTimeout(() => {
        el.style.opacity = "0";
        setTimeout(() => el.style.display = "none", 500);
      }, 800);
    }
    // Go straight to landing — static splash already showed the logo
    if (screen === "splash") {
      setTimeout(() => setScreen("landing"), 1000);
    }
  }, []);
  const toggleLang = () => setLang(l => l === "en" ? "es" : "en");

  return (
    <div style={{ fontFamily:"'Montserrat',sans-serif", minHeight:"100vh", background:"#fff", color:BLACK, maxWidth:480, margin:"0 auto", position:"relative" }}>
      {/* Toast */}
      {toast && (
        <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", zIndex:9999, background:BLACK, color:"#fff", padding:"12px 24px", borderRadius:50, fontWeight:600, fontSize:13, boxShadow:"0 8px 32px rgba(0,0,0,.25)", whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ width:8, height:8, borderRadius:"50%", background:M, flexShrink:0 }}/>
          {toast}
        </div>
      )}
      {screen==="landing"  && <Landing  t={t} lang={lang} toggleLang={toggleLang} onL={()=>setScreen("login-l")} onT={()=>setScreen("login-t")}/>}
      {screen==="login-l"  && <Login    t={t} lang={lang} toggleLang={toggleLang} role="l" onBack={()=>setScreen("landing")} onIn={()=>setScreen("landlord")}/>}
      {screen==="login-t"  && <Login    t={t} lang={lang} toggleLang={toggleLang} role="t" onBack={()=>setScreen("landing")} onIn={()=>setScreen("tenant")}/>}
      {screen==="landlord" && <Landlord t={t} lang={lang} toggleLang={toggleLang} props_={props_} setProps={setProps} maint={maint} setMaint={setMaint} tasks={tasks} setTasks={setTasks} notify={notify} onOut={()=>setScreen("landing")}/>}
      {screen==="tenant"   && props_.length > 0 && <Tenant t={t} lang={lang} toggleLang={toggleLang} prop={props_[0]} pays={pays} setPays={setPays} maint={maint} setMaint={setMaint} notify={notify} onOut={()=>setScreen("landing")}/>}

    </div>
  );
}

                            : <span className="pill" style={{background:ML,color:MD}}>🔔 {t.due_in} {r.days} {t.due_d}</span>

                      </div>
                    </div>
                    <button className="tap" onClick={()=>sendRem(p)} style={{background:BLACK,border:"none",color:"#fff",padding:"9px 14px",borderRadius:12,fontSize:12,fontWeight:700,flexShrink:0}}>

                    </button>
                  </div>

              })}
            </div>

            {/* Recent repairs */}
            {maint.length>0&&(
              <ListCard title={`🔧 ${t.recent_r}`} onMore={()=>setTab("repair")} t={t}>

                  const p=props_.find(x=>x.id===m.propId);
                  const st=sPillStyle(m.status);
                  return(
                    <div key={m.id} style={{padding:"13px 16px",borderBottom:`1px solid ${GRAY100}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:14}}>{m.type}</div>
                        <div style={{fontSize:12,color:GRAY400,marginTop:1}}>{p?.name} · {m.date}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                        <span className="pill" style={{background:st.bg,color:st.color}}>{m.status}</span>

                      </div>
                    </div>
                  );

              </ListCard>

            {/* Upcoming tasks */}
            {tasks.filter(tk=>tk.status!=="Done").length>0&&(
              <div style={{marginTop:12}}>
                <ListCard title={`☑ ${t.upcoming_t}`} onMore={()=>setTab("tasks")} t={t}>

                          <div>
                            <div style={{fontWeight:600,fontSize:14}}>{tk.task}</div>
                            <div style={{fontSize:12,color:GRAY400}}>{p?.name} · {tk.dueDate}</div>

                        </div>
                        <span className="pill" style={{background:GRAY100,color:prioColor(tk.priority)}}>{tk.priority}</span>
                      </div>

              </div>

            {props_.length===0&&(
              <div style={{textAlign:"center",padding:"48px 24px",background:"#fff",borderRadius:20,border:`2px dashed ${GRAY200}`}}>

                <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:22,fontWeight:200,letterSpacing:"-1px",color:BLACK,marginBottom:6}}>{t.start_here}</div>

                <button className="tap" onClick={()=>{setTab("props");setSheet("addProp");}} style={{background:M,border:"none",color:BLACK,padding:"13px 28px",borderRadius:50,fontWeight:700,fontSize:15,fontFamily:"'Montserrat',sans-serif"}}>{t.add_prop}</button>
              </div>
            )}
          </div>

        {/* ── PROPERTIES ── */}
        {tab==="props"&&(
          <div className="fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px 18px"}}>
              <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:200,letterSpacing:"-1px"}}>{t.nav_props}</div>
              <button className="tap" onClick={()=>setSheet("addProp")} style={{background:BLACK,border:"none",color:"#fff",padding:"10px 18px",borderRadius:50,fontWeight:600,fontSize:13}}>{t.add_prop}</button>
            </div>
            {props_.length===0 && <Empty t={t}/>}
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {props_.map(p=>{
                const r=getRemStatus(p);
                const oc=maint.filter(m=>m.propId===p.id&&m.status!=="Resolved").length;
                const isAB=p.propType==="airbnb";
                return(
                  <div key={p.id} style={{background:"#fff",borderRadius:18,border:`1.5px solid ${r?M:GRAY100}`,overflow:"hidden"}}>
                    {/* Top accent strip for reminder */}
                    {r&&<div style={{height:4,background:M,width:"100%"}}/>}
                    <div style={{padding:18}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                            <span style={{fontFamily:"'Montserrat',sans-serif",fontWeight:200,fontSize:17,color:BLACK}}>{p.name}</span>
                            {isAB&&<span className="pill" style={{background:"#fff0f3",color:"#E11D48"}}>Airbnb</span>}
                          </div>
                          <div style={{fontSize:12,color:GRAY400}}>{p.address}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                          <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:200,fontSize:20,color:BLACK}}>${p.rentAmount}</div>
                          <div style={{fontSize:10,color:GRAY400,marginTop:1}}>{freqLabel(p.payFreq,t)}</div>
                        </div>
                      </div>

                      {/* Badges */}
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                        {oc>0&&<span className="pill" style={{background:REDL,color:RED}}>{oc} {lang==="en"?"open":"abiertos"}</span>}

                        {r?.type==="overdue"&&<span className="pill" style={{background:REDL,color:RED}}>⚠ {t.overdue}</span>}
                        {r?.type==="soon"&&<span className="pill" style={{background:ML,color:MD}}>{r.days===0?t.due_today:`🔔 ${r.days}d`}</span>}
                        {isAB&&p.checkIn&&<span className="pill" style={{background:GRAY100,color:GRAY500}}>📅 {p.checkIn}→{p.checkOut}</span>}

                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:12,borderTop:`1px solid ${GRAY100}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:36,height:36,borderRadius:"50%",background:isAB?"#fff0f3":ML,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,color:isAB?"#E11D48":MD,flexShrink:0}}>{p.avatar||"?"}</div>
                          <div>
                            <div style={{fontWeight:600,fontSize:14}}>{p.tenantName||"—"}</div>
                            {p.nextDue&&<div style={{fontSize:11,color:r?MD:GRAY400}}>📅 {p.nextDue}</div>}
                          </div>
                        </div>
                        <div style={{display:"flex",gap:8}}>
                          {r&&<button className="tap" onClick={()=>sendRem(p)} style={{background:M,border:"none",color:BLACK,padding:"8px 12px",borderRadius:10,fontSize:12,fontWeight:700}}>🔔</button>}

                          <button className="tap" onClick={()=>setSheet(p)} style={{background:GRAY100,border:"none",color:BLACK,padding:"8px 14px",borderRadius:10,fontSize:13,fontWeight:600}}>💬</button>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── REPAIRS ── */}
        {tab==="repair"&&(
          <div className="fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px 18px"}}>
              <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:200,letterSpacing:"-1px"}}>🔧 {t.nav_repair}</div>
              <button className="tap" onClick={()=>setSheet("addRepair")} style={{background:BLACK,border:"none",color:"#fff",padding:"10px 18px",borderRadius:50,fontWeight:600,fontSize:13}}>{t.add_repair}</button>
            </div>
            {/* Mini stats */}
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {[[t.s_open,openC,RED,REDL],[t.in_prog,maint.filter(m=>m.status==="In Progress").length,"#B45309",ORANGEL],[t.s_resolved,resC,GREEN,GREENL]].map(([l,v,c,bg])=>(
                <div key={l} style={{flex:1,background:bg,borderRadius:14,padding:"12px",textAlign:"center"}}>
                  <div style={{fontSize:10,fontWeight:700,color:c,textTransform:"uppercase",letterSpacing:.5}}>{l}</div>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:26,fontWeight:200,letterSpacing:"-1px",color:c,marginTop:2}}>{v}</div>
                </div>
              ))}
            </div>
            {maint.length===0&&<Empty t={t}/>}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {maint.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(m=>{
                const p=props_.find(x=>x.id===m.propId);
                const st=sPillStyle(m.status);
                return(
                  <div key={m.id} style={{background:"#fff",borderRadius:16,border:`1px solid ${GRAY100}`,padding:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{fontWeight:700,fontSize:15,color:BLACK}}>{m.type}</div>
                      <span className="pill" style={{background:st.bg,color:st.color}}>{m.status}</span>
                    </div>
                    <div style={{fontSize:13,color:GRAY500,marginBottom:4}}>{m.description}</div>
                    <div style={{fontSize:12,color:GRAY400,marginBottom:12}}>{p?.name} · {m.date}{m.contractor?` · ${m.contractor}`:""}</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:10,borderTop:`1px solid ${GRAY100}`}}>
                      <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:200,fontSize:18,color:BLACK}}>{m.cost?`$${m.cost}`:"—"}</div>
                      {m.status!=="Resolved"&&(
                        <button className="tap" onClick={()=>resolve(m.id)} style={{background:GREENL,border:"none",color:GREEN,padding:"8px 16px",borderRadius:10,fontSize:13,fontWeight:700}}>✓ {t.resolve}</button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── TASKS ── */}
        {tab==="tasks"&&(
          <div className="fade">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px 18px"}}>
              <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:200,letterSpacing:"-1px"}}>☑ {t.nav_tasks}</div>
              <button className="tap" onClick={()=>setSheet("addTask")} style={{background:BLACK,border:"none",color:"#fff",padding:"10px 18px",borderRadius:50,fontWeight:600,fontSize:13}}>{t.add_task}</button>
            </div>
            {tasks.length===0&&<Empty t={t}/>}
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {tasks.sort((a,b)=>new Date(a.dueDate)-new Date(b.dueDate)).map(tk=>{
                const p=props_.find(x=>x.id===tk.propId);
                const done=tk.status==="Done";
                return(
                  <div key={tk.id} style={{background:"#fff",borderRadius:16,border:`1px solid ${GRAY100}`,padding:16,opacity:done?.5:1}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                      <div className="tap" onClick={()=>{setTasks(x=>x.map(r=>r.id===tk.id?{...r,status:"Done"}:r));notify(lang==="en"?"Task done ✓":"Tarea completada ✓");}} style={{width:22,height:22,borderRadius:6,border:`2px solid ${done?GREEN:GRAY200}`,background:done?GREEN:"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                        {done&&<span style={{color:"#fff",fontSize:13,fontWeight:800}}>✓</span>}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:15,color:BLACK,textDecoration:done?"line-through":"none"}}>{tk.task}</div>
                        <div style={{fontSize:12,color:GRAY400,marginTop:2}}>{p?.name} · {tk.dueDate}</div>
                        <div style={{display:"flex",gap:8,marginTop:8,alignItems:"center"}}>
                          <span style={{fontSize:11,fontWeight:700,color:prioColor(tk.priority),background:GRAY100,padding:"3px 9px",borderRadius:20}}>{tk.priority}</span>
                          {tk.estimatedCost>0&&<span style={{fontSize:13,fontWeight:700,color:GRAY500}}>${tk.estimatedCost}</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── MORE ── */}
        {tab==="reports"&&(
          <ReportsTab props_={props_} maint={maint} tasks={tasks} lang={lang} t={t}/>
        )}
        {tab==="notifs"&&(
          <NotifsTab props_={props_} maint={maint} tasks={tasks} lang={lang} t={t} notify={notify}/>
        )}
        {tab==="more"&&(
          <div className="fade">
            <div style={{padding:"4px 4px 18px",fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:200,letterSpacing:"-1px"}}>···</div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[["tenants",`👥 ${t.tenants}`],["messages",`💬 ${t.msgs}`]].map(([id,label])=>(
                <button key={id} className="tap" onClick={()=>setMorePage(id)} style={{flex:1,padding:"11px",borderRadius:12,border:`1.5px solid ${morePage===id?BLACK:GRAY200}`,background:morePage===id?BLACK:"#fff",color:morePage===id?"#fff":GRAY400,fontWeight:600,fontSize:14,fontFamily:"'Montserrat',sans-serif"}}>{label}</button>
              ))}
            </div>
            {morePage==="tenants"&&(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {props_.length===0&&<Empty t={t}/>}
                {props_.map(p=>{
                  const isAB=p.propType==="airbnb";
                  return(
                    <div key={p.id} style={{background:"#fff",border:`1px solid ${GRAY100}`,borderRadius:16,padding:18}}>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                        <div style={{width:48,height:48,borderRadius:"50%",background:isAB?"#fff0f3":ML,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:isAB?"#E11D48":MD,flexShrink:0}}>{p.avatar||"?"}</div>
                        <div>
                          <div style={{fontWeight:700,fontSize:16,color:BLACK}}>{p.tenantName||"—"}</div>
                          <div style={{fontSize:12,color:GRAY400}}>{p.name} {isAB?"· Airbnb":""}</div>
                        </div>
                      </div>
                      <div style={{fontSize:13,color:GRAY500,lineHeight:2,borderTop:`1px solid ${GRAY100}`,paddingTop:12,marginBottom:12}}>
                        {p.phone&&<div>📞 {p.phone}</div>}
                        <div>💰 ${p.rentAmount} / {freqLabel(p.payFreq,t)}</div>
                        {p.nextDue&&<div>📅 {lang==="en"?"Next due":"Próximo"}: {p.nextDue}</div>}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button className="tap" onClick={()=>setSheet(p)} style={{flex:1,background:BLACK,border:"none",color:"#fff",padding:"11px",borderRadius:12,fontWeight:600,fontSize:14}}>💬 {t.msg}</button>
                        <button className="tap" onClick={()=>notify(`Calling ${p.tenantName||p.name}...`)} style={{flex:1,background:GRAY50,border:`1px solid ${GRAY200}`,color:BLACK,padding:"11px",borderRadius:12,fontWeight:600,fontSize:14}}>📞 {t.call}</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {morePage==="messages"&&(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {props_.length===0&&<Empty t={t}/>}
                {props_.map(p=>(
                  <div key={p.id} className="tap" onClick={()=>setSheet(p)} style={{background:"#fff",border:`1px solid ${GRAY100}`,borderRadius:14,padding:16,display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:44,height:44,borderRadius:"50%",background:ML,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:MD,flexShrink:0}}>{p.avatar||"?"}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:15}}>{p.tenantName||"—"}</div>
                      <div style={{fontSize:12,color:GRAY400}}>{p.name}</div>
                    </div>
                    <div style={{width:10,height:10,borderRadius:"50%",background:M}}/>
                  </div>
                ))}
              </div>
            )}
            <div style={{marginTop:20,background:"#fff",border:`1px solid ${GRAY100}`,borderRadius:16,overflow:"hidden"}}>
              <button className="tap" onClick={toggleLang} style={{width:"100%",padding:"16px 18px",background:"none",border:"none",color:BLACK,fontSize:15,textAlign:"left",borderBottom:`1px solid ${GRAY100}`,display:"flex",alignItems:"center",gap:12,fontFamily:"'Montserrat',sans-serif",fontWeight:500}}>🌐 {t.lang}</button>
              <button className="tap" onClick={onOut} style={{width:"100%",padding:"16px 18px",background:"none",border:"none",color:RED,fontSize:15,textAlign:"left",display:"flex",alignItems:"center",gap:12,fontFamily:"'Montserrat',sans-serif",fontWeight:500}}>↩ {t.logout}</button>
            </div>
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div className="nav-bar">
        {navs.map(n=>(
          <button key={n.id} className="tap" onClick={()=>setTab(n.id)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",position:"relative",fontFamily:"'Montserrat',sans-serif"}}>
            <span style={{fontSize:n.id==="home"||n.id==="props"?19:17,lineHeight:1.4}}>{n.icon}</span>
            <span style={{fontSize:9,fontWeight:700,color:tab===n.id?BLACK:GRAY400,letterSpacing:.3}}>{n.label}</span>
            {tab===n.id&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,borderRadius:2,background:M}}/>}
            {n.id==="home"&&reminders.length>0&&<div style={{position:"absolute",top:6,right:"20%",width:7,height:7,borderRadius:"50%",background:M}}/>}
          </button>
        ))}
      </div>

      {/* Sheets */}
      {sheet==="addProp"   &&<Overlay onClose={()=>setSheet(null)}><PropForm   t={t} lang={lang} onSave={addProp}  onCancel={()=>setSheet(null)}/></Overlay>}
      {sheet==="addRepair" &&<Overlay onClose={()=>setSheet(null)}><RepairForm t={t} lang={lang} props_={props_} onSave={addMaint} onCancel={()=>setSheet(null)}/></Overlay>}
      {sheet==="addTask"   &&<Overlay onClose={()=>setSheet(null)}><TaskForm   t={t} lang={lang} props_={props_} onSave={addTask}  onCancel={()=>setSheet(null)}/></Overlay>}
      {sheet&&typeof sheet==="object"&&sheet.type==="docs"&&<Overlay onClose={()=>setSheet(null)}><DocsSheet t={t} lang={lang} prop={sheet.prop} docs={docs} onAdd={addDoc} onDelete={id=>setDocs(x=>x.filter(d=>d.id!==id))} onClose={()=>setSheet(null)}/></Overlay>}
      {sheet&&typeof sheet==="object"&&!sheet.type&&<Overlay onClose={()=>setSheet(null)}><MsgForm t={t} lang={lang} prop={sheet} onSend={()=>{notify(`Sent to ${sheet.tenantName||sheet.name} ✓`);setSheet(null);}}/></Overlay>}
    </div>
  );
}

// ── TENANT ────────────────────────────────────────────────────────────────
function Tenant({t,lang,toggleLang,prop,pays,setPays,maint,setMaint,notify,onOut}){

                </div>
                <button className="tap" onClick={()=>setTab("pay")} style={{background:M,border:"none",color:BLACK,padding:"10px 16px",borderRadius:12,fontWeight:700,fontSize:13,flexShrink:0}}>{t.pay_rent}</button>
              </div>

              {myPays.map(ph=>(

// ── NOTIFICATIONS TAB ─────────────────────────────────────────────────────
function NotifsTab({props_, maint, tasks, lang, t, notify}) {
  const M="#F5A623",ML="#FFF3DC",MD="#C4831A",BLACK="#0A0A0A";
  const GRAY50="#F8F8F8",GRAY100="#F2F2F2",GRAY200="#E5E5E5",GRAY400="#9A9A9A",GRAY500="#6B6B6B";
  const GREEN="#2D7D46",GREENL="#E6F4EC",RED="#E53E3E",REDL="#FEF0F0",ORANGEL="#FFF7E6";

  const [filter, setFilter] = React.useState("all");
  const [dismissed, setDismissed] = React.useState([]);

  const daysUntilLocal = d => d ? Math.ceil((new Date(d) - new Date()) / 86400000) : null;

  // ── Build notification list dynamically ──
  const allNotifs = [];

  // Payment alerts from real properties
  props_.forEach(p => {
    const d = daysUntilLocal(p.nextDue);
    if (d !== null && d < 0) {
      allNotifs.push({
        id: `overdue-${p.id}`,
        type: "payment",
        priority: "high",
        icon: "⚠",
        iconBg: REDL, iconColor: RED,
        title: lang==="en" ? "Overdue Payment" : "Pago Vencido",
        body: `${p.tenantName||p.name} — $${p.rentAmount} · ${Math.abs(d)} ${lang==="en"?"days overdue":"días vencido"}`,
        time: lang==="en" ? "Past due" : "Vencido",
        action: lang==="en" ? "Send Notice" : "Enviar Aviso",
        actionFn: () => notify(`Notice sent to ${p.tenantName||p.name} ✓`),
      });
    } else if (d !== null && d <= 5) {
      allNotifs.push({
        id: `due-${p.id}`,
        type: "payment",
        priority: "medium",
        icon: "🔔",
        iconBg: ML, iconColor: MD,
        title: d===0 ? (lang==="en"?"Due Today":"Vence Hoy") : (lang==="en"?"Payment Due Soon":"Pago Próximo"),
        body: `${p.tenantName||p.name} — $${p.rentAmount} · ${d===0?(lang==="en"?"today":"hoy"):`${lang==="en"?"in":"en"} ${d} ${lang==="en"?"days":"días"}`}`,
        time: d===0 ? (lang==="en"?"Today":"Hoy") : `${d}d`,
        action: lang==="en" ? "Send Reminder" : "Recordar",
        actionFn: () => notify(`Reminder sent to ${p.tenantName||p.name} ✓`),
      });
    }
  });

  // Open repair alerts
  maint.filter(m => m.status==="Open").forEach(m => {
    const p = props_.find(x=>x.id===m.propId);
    allNotifs.push({
      id: `repair-open-${m.id}`,
      type: "repair",
      priority: "medium",
      icon: "🔧",
      iconBg: ORANGEL, iconColor: "#B45309",
      title: lang==="en" ? "Open Repair" : "Reparación Abierta",
      body: `${m.type} — ${p?.name||lang==="en"?"Unknown":"Desconocida"} · ${m.date}`,
      time: m.date,
      action: lang==="en" ? "View" : "Ver",
      actionFn: () => notify(`${m.type} opened ✓`),
    });
  });

  // In progress repairs
  maint.filter(m => m.status==="In Progress").forEach(m => {
    const p = props_.find(x=>x.id===m.propId);
    allNotifs.push({
      id: `repair-prog-${m.id}`,
      type: "repair",
      priority: "low",
      icon: "⚙",
      iconBg: GRAY100, iconColor: GRAY500,
      title: lang==="en" ? "Repair In Progress" : "En Progreso",
      body: `${m.type} — ${p?.name||""} · ${m.contractor||lang==="en"?"No contractor":"Sin contratista"}`,
      time: m.date,
      action: lang==="en" ? "Mark Done" : "Completar",
      actionFn: () => notify(`${m.type} marked resolved ✓`),
    });
  });

  // Overdue tasks
  tasks.filter(tk => tk.status!=="Done" && tk.dueDate && daysUntilLocal(tk.dueDate) < 0).forEach(tk => {
    const p = props_.find(x=>x.id===tk.propId);
    allNotifs.push({
      id: `task-${tk.id}`,
      type: "task",
      priority: "medium",
      icon: "☑",
      iconBg: REDL, iconColor: RED,
      title: lang==="en" ? "Overdue Task" : "Tarea Vencida",
      body: `${tk.task} — ${p?.name||""} · ${tk.priority} priority`,
      time: tk.dueDate,
      action: lang==="en" ? "Complete" : "Completar",
      actionFn: () => notify(`Task marked done ✓`),
    });
  });

  // Upcoming tasks (within 7 days)
  tasks.filter(tk => {
    const d = daysUntilLocal(tk.dueDate);
    return tk.status!=="Done" && d !== null && d >= 0 && d <= 7;
  }).forEach(tk => {
    const p = props_.find(x=>x.id===tk.propId);
    const d = daysUntilLocal(tk.dueDate);
    allNotifs.push({
      id: `task-soon-${tk.id}`,
      type: "task",
      priority: "low",
      icon: "📋",
      iconBg: GRAY100, iconColor: GRAY500,
      title: lang==="en" ? "Task Due Soon" : "Tarea Próxima",
      body: `${tk.task} — ${p?.name||""} · ${lang==="en"?"in":"en"} ${d} ${lang==="en"?"days":"días"}`,
      time: `${d}d`,
      action: lang==="en" ? "View" : "Ver",
      actionFn: () => {},
    });
  });

  // No static demo notifications — all alerts come from real data
  const staticNotifs = [];

  const allCombined = [...allNotifs, ...staticNotifs].filter(n => !dismissed.includes(n.id));

  const filtered = filter==="all" ? allCombined
    : allCombined.filter(n => n.type===filter);

  const highCount = allCombined.filter(n=>n.priority==="high").length;
  const medCount  = allCombined.filter(n=>n.priority==="medium").length;

  const priorityOrder = {high:0, medium:1, low:2};
  const sorted = [...filtered].sort((a,b) => priorityOrder[a.priority] - priorityOrder[b.priority]);

  const filters = [
    ["all",    lang==="en"?"All":"Todo",     allCombined.length],
    ["payment",lang==="en"?"Payments":"Pagos", allCombined.filter(n=>n.type==="payment").length],
    ["repair", lang==="en"?"Repairs":"Reparaciones", allCombined.filter(n=>n.type==="repair").length],
    ["task",   lang==="en"?"Tasks":"Tareas", allCombined.filter(n=>n.type==="task").length],
    ["system", lang==="en"?"System":"Sistema", allCombined.filter(n=>n.type==="system").length],
  ];

  return (
    <div className="fade">
      {/* Header */}
      <div style={{padding:"4px 4px 18px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <div style={{fontFamily:"'Montserrat',sans-serif", fontSize:20, fontWeight:200, letterSpacing:"3px", textTransform:"uppercase", color:BLACK}}>
          {lang==="en"?"Alerts":"Alertas"}
        </div>
        <div style={{display:"flex", gap:8, alignItems:"center"}}>
          {highCount > 0 && (
            <div style={{background:RED, color:"#fff", padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:700}}>
              {highCount} {lang==="en"?"urgent":"urgente"}
            </div>
          )}
          {dismissed.length > 0 && (
            <button className="tap" onClick={()=>setDismissed([])} style={{background:"none",border:"none",color:GRAY400,fontSize:12,fontFamily:"'Montserrat',sans-serif"}}>
              {lang==="en"?"Restore":"Restaurar"}
            </button>
          )}
        </div>
      </div>

      {/* Summary bar */}
      {(highCount > 0 || medCount > 0) && (
        <div style={{background:BLACK, borderRadius:16, padding:"16px 18px", marginBottom:14, display:"flex", gap:16}}>
          {highCount > 0 && (
            <div style={{flex:1, textAlign:"center"}}>
              <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:28, color:RED, letterSpacing:"-1px"}}>{highCount}</div>
              <div style={{fontSize:10, color:"rgba(255,255,255,.4)", textTransform:"uppercase", letterSpacing:1.5, marginTop:2}}>{lang==="en"?"Urgent":"Urgente"}</div>
            </div>
          )}
          {highCount > 0 && medCount > 0 && <div style={{width:1, background:"rgba(255,255,255,.1)"}}/>}
          {medCount > 0 && (
            <div style={{flex:1, textAlign:"center"}}>
              <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:28, color:M, letterSpacing:"-1px"}}>{medCount}</div>
              <div style={{fontSize:10, color:"rgba(255,255,255,.4)", textTransform:"uppercase", letterSpacing:1.5, marginTop:2}}>{lang==="en"?"Attention":"Atención"}</div>
            </div>
          )}
          {(highCount > 0 || medCount > 0) && <div style={{width:1, background:"rgba(255,255,255,.1)"}}/>}
          <div style={{flex:1, textAlign:"center"}}>
            <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:28, color:"#fff", letterSpacing:"-1px"}}>{allCombined.length}</div>
            <div style={{fontSize:10, color:"rgba(255,255,255,.4)", textTransform:"uppercase", letterSpacing:1.5, marginTop:2}}>{lang==="en"?"Total":"Total"}</div>
          </div>
        </div>
      )}

      {/* Filter chips */}
      <div style={{display:"flex", gap:7, overflowX:"auto", paddingBottom:4, marginBottom:16}}>
        {filters.map(([id, label, count]) => count > 0 || id==="all" ? (
          <button key={id} className="tap" onClick={()=>setFilter(id)} style={{
            flexShrink:0, padding:"7px 14px",
            borderRadius:50,
            border:`1.5px solid ${filter===id ? BLACK : GRAY200}`,
            background: filter===id ? BLACK : "#fff",
            color: filter===id ? "#fff" : GRAY500,
            fontSize:12, fontWeight:filter===id?500:400,
            fontFamily:"'Montserrat',sans-serif",
            display:"flex", alignItems:"center", gap:6,
          }}>
            {label}
            {count > 0 && (
              <span style={{
                background: filter===id ? M : GRAY100,
                color: filter===id ? BLACK : GRAY500,
                borderRadius:20, padding:"1px 7px", fontSize:10, fontWeight:700,
              }}>{count}</span>
            )}
          </button>
        ) : null)}
      </div>

      {/* Notification list */}
      {sorted.length === 0 ? (
        <div style={{textAlign:"center", padding:"52px 24px", background:"#fff", borderRadius:16, border:`1.5px dashed ${GRAY200}`}}>
          <div style={{fontSize:40, marginBottom:12, opacity:.3}}>🔔</div>
          <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:18, color:BLACK, letterSpacing:"2px", textTransform:"uppercase", marginBottom:6}}>
            {lang==="en"?"All Clear":"Todo en Orden"}
          </div>
          <div style={{fontSize:13, color:GRAY400}}>{lang==="en"?"No alerts right now":"Sin alertas por ahora"}</div>
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          {sorted.map(n => (
            <div key={n.id} style={{
              background:"#fff",
              border:`1.5px solid ${n.priority==="high" ? "#fca5a5" : n.priority==="medium" ? M+"55" : GRAY100}`,
              borderRadius:16,
              padding:16,
              position:"relative",
              overflow:"hidden",
            }}>
              {/* Priority accent line */}
              {n.priority==="high" && <div style={{position:"absolute", left:0, top:0, bottom:0, width:3, background:RED, borderRadius:"3px 0 0 3px"}}/>}
              {n.priority==="medium" && <div style={{position:"absolute", left:0, top:0, bottom:0, width:3, background:M, borderRadius:"3px 0 0 3px"}}/>}

              <div style={{display:"flex", gap:12, alignItems:"flex-start"}}>
                {/* Icon */}
                <div style={{
                  width:40, height:40, borderRadius:12,
                  background:n.iconBg,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:17, flexShrink:0,
                  color:n.iconColor,
                }}>
                  {n.icon}
                </div>

                {/* Content */}
                <div style={{flex:1, minWidth:0}}>
                  <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:3}}>
                    <div style={{fontWeight:600, fontSize:14, color:BLACK, lineHeight:1.3}}>{n.title}</div>
                    <div style={{fontSize:10, color:GRAY400, flexShrink:0, marginLeft:8, marginTop:1}}>{n.time}</div>
                  </div>
                  <div style={{fontSize:12, color:GRAY500, lineHeight:1.5, marginBottom: n.action ? 10 : 0}}>{n.body}</div>
                  {n.action && (
                    <div style={{display:"flex", gap:8}}>
                      <button className="tap" onClick={n.actionFn} style={{
                        padding:"7px 16px", borderRadius:20,
                        background: n.priority==="high" ? RED : n.priority==="medium" ? M : GRAY100,
                        color: n.priority==="high" ? "#fff" : n.priority==="medium" ? BLACK : GRAY500,
                        border:"none", fontSize:12, fontWeight:600,
                        fontFamily:"'Montserrat',sans-serif",
                      }}>{n.action}</button>
                      <button className="tap" onClick={()=>setDismissed(d=>[...d, n.id])} style={{
                        padding:"7px 12px", borderRadius:20,
                        background:"none", border:`1px solid ${GRAY200}`,
                        color:GRAY400, fontSize:12,
                        fontFamily:"'Montserrat',sans-serif",
                      }}>{lang==="en"?"Dismiss":"Ignorar"}</button>
                    </div>
                  )}
                </div>

                {/* No-action dismiss */}
                {!n.action && (
                  <button className="tap" onClick={()=>setDismissed(d=>[...d, n.id])} style={{
                    background:"none", border:"none", color:GRAY200,
                    fontSize:16, padding:"0 0 0 4px", flexShrink:0, alignSelf:"center",
                  }}>×</button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Clear all */}
      {sorted.length > 0 && (
        <button className="tap" onClick={()=>setDismissed(allCombined.map(n=>n.id))} style={{
          width:"100%", marginTop:16, padding:"14px",
          background:"none", border:`1px solid ${GRAY200}`,
          borderRadius:14, color:GRAY400,
          fontFamily:"'Montserrat',sans-serif", fontSize:13, fontWeight:400,
          letterSpacing:"0.5px",
        }}>
          {lang==="en"?"Dismiss All":"Ignorar Todo"}
        </button>
      )}
    </div>
  );
}

// ── REPORTS TAB ───────────────────────────────────────────────────────────
function ReportsTab({props_, maint, tasks, lang, t}) {
  const [view, setView] = useState("portfolio");
  const M = "#F5A623";
  const ML = "#FFF3DC";
  const MD = "#C4831A";
  const BLACK = "#0A0A0A";
  const GRAY50 = "#F8F8F8";
  const GRAY100 = "#F2F2F2";
  const GRAY200 = "#E5E5E5";
  const GRAY400 = "#9A9A9A";
  const GRAY500 = "#6B6B6B";
  const GREEN = "#2D7D46";
  const GREENL = "#E6F4EC";
  const RED = "#E53E3E";
  const REDL = "#FEF0F0";

  // ── Derived numbers ──
  const totalRent = props_.reduce((s,p) => s + (Number(p.rentAmount)||0), 0);
  const totalRepairCost = maint.reduce((s,m) => s + (Number(m.cost)||0), 0);
  const openRepairs = maint.filter(m => m.status === "Open" || m.status === "In Progress").length;
  const resolvedRepairs = maint.filter(m => m.status === "Resolved").length;
  const occupancy = props_.length > 0 ? Math.round((props_.filter(p => p.tenantName).length / props_.length) * 100) : 0;
  const netIncome = totalRent - totalRepairCost;
  const hasData = props_.length > 0;
  const capRate = totalRent > 0 ? ((netIncome / (totalRent * 12)) * 100).toFixed(1) : 0;

  // ── Demo monthly data (scales with real data if present) ──
  const base = totalRent;
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const incomeData  = [.88,.91,.95,.98,1,1.02,.97,1.04,1,1.06,1.03,1.08].map(f => Math.round(base * f));
  const expenseData = [.18,.14,.22,.16,.19,.13,.25,.17,.21,.15,.18,.20].map(f => Math.round(base * f));
  const netData     = incomeData.map((v,i) => v - expenseData[i]);
  const maxBar      = Math.max(...incomeData);
  const ytdIncome   = incomeData.slice(0,3).reduce((a,b)=>a+b,0);
  const ytdExpense  = expenseData.slice(0,3).reduce((a,b)=>a+b,0);
  const ytdNet      = ytdIncome - ytdExpense;

  // Repair breakdown by type
  const repairByType = maint.reduce((acc, m) => {
    acc[m.type] = (acc[m.type]||0) + (Number(m.cost)||0);
    return acc;
  }, {});
  const topRepairs = Object.entries(repairByType).sort((a,b)=>b[1]-a[1]).slice(0,4);

  const Num = ({value, size=32, color=BLACK, prefix="$"}) => (
    <span style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:size, color, letterSpacing:"-1px", lineHeight:1}}>
      {prefix}{typeof value === "number" ? value.toLocaleString() : value}
    </span>
  );

  const Label = ({text}) => (
    <div style={{fontSize:10, fontWeight:500, color:GRAY400, textTransform:"uppercase", letterSpacing:2, marginBottom:6}}>{text}</div>
  );

  const Card = ({children, style={}}) => (
    <div style={{background:"#fff", border:`1px solid ${GRAY100}`, borderRadius:16, padding:18, ...style}}>{children}</div>
  );

  return (
    <div className="fade" style={{paddingBottom:8}}>
      {/* Header */}
      <div style={{padding:"4px 4px 18px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <div style={{fontFamily:"'Montserrat',sans-serif", fontSize:20, fontWeight:200, letterSpacing:"3px", textTransform:"uppercase", color:BLACK}}>
          {lang==="en"?"Reports":"Reportes"}
        </div>
        <div style={{fontSize:11, color:GRAY400, fontWeight:400}}>2025</div>
      </div>

      {/* View toggle */}
      <div style={{display:"flex", gap:0, background:GRAY100, borderRadius:14, padding:4, marginBottom:20}}>
        {[["portfolio", lang==="en"?"Portfolio":"Portafolio"],
          ["income",    lang==="en"?"Income":"Ingresos"],
          ["tax",       lang==="en"?"Tax":"Impuestos"]
        ].map(([id, label]) => (
          <button key={id} className="tap" onClick={()=>setView(id)} style={{
            flex:1, padding:"10px 4px", borderRadius:11, border:"none",
            background: view===id ? "#fff" : "transparent",
            color: view===id ? BLACK : GRAY400,
            fontWeight: view===id ? 600 : 400,
            fontSize:12, fontFamily:"'Montserrat',sans-serif",
            boxShadow: view===id ? "0 2px 8px rgba(0,0,0,.08)" : "none",
            transition:"all .2s", letterSpacing:"0.5px"
          }}>{label}</button>
        ))}
      </div>

      {/* ── PORTFOLIO VIEW ── */}
      {view==="portfolio" && (
        <div className="fade">
          {/* Key metrics grid */}
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
            {/* Market Value — full width mango */}
            <div style={{background:BLACK, borderRadius:16, padding:"20px 18px", gridColumn:"span 2", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
              <div>
                <Label text={lang==="en"?"Total Portfolio Income / mo":"Ingresos Totales / mes"}/>
                <Num value={totalRent||3200} size={38} color={M}/>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10, color:"rgba(255,255,255,.3)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:4}}>Properties</div>
                <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:32, color:"#fff"}}>{props_.length||0}</div>
              </div>
            </div>

            {/* Net Income */}
            <Card>
              <Label text={lang==="en"?"Net Income":"Neto"}/>
              <Num value={netIncome > 0 ? netIncome : 2780} size={24} color={GREEN}/>
              <div style={{fontSize:10, color:GRAY400, marginTop:4}}>{lang==="en"?"after repairs":"después de reparaciones"}</div>
            </Card>

            {/* Occupancy */}
            <Card>
              <Label text={lang==="en"?"Occupancy":"Ocupación"}/>
              <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:28, color:occupancy>=80?GREEN:RED, letterSpacing:"-1px"}}>
                {props_.length > 0 ? `${occupancy}%` : "—"}
              </div>
              <div style={{marginTop:8, height:4, background:GRAY100, borderRadius:2}}>
                <div style={{height:"100%", width:`${occupancy||85}%`, background:occupancy>=80?GREEN:RED, borderRadius:2, transition:"width .6s ease"}}/>
              </div>
            </Card>

            {/* Cap Rate */}
            <Card>
              <Label text="Cap Rate"/>
              <Num value={props_.length>0 ? capRate : "9.2"} size={28} color={BLACK} prefix=""/>
              <div style={{fontSize:10, color:GRAY400, marginTop:4}}>%</div>
            </Card>

            {/* Repair Spend */}
            <Card>
              <Label text={lang==="en"?"Repair Spend":"Reparaciones"}/>
              <Num value={totalRepairCost} size={24} color={totalRepairCost>2000?RED:BLACK}/>
              <div style={{fontSize:10, color:GRAY400, marginTop:4}}>{openRepairs} {lang==="en"?"open":"abiertos"}</div>
            </Card>
          </div>

          {/* Cash Flow bar chart */}
          <Card style={{marginBottom:12}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16}}>
              <Label text={lang==="en"?"Net Cash Flow by Month":"Flujo Neto por Mes"}/>
              <div style={{display:"flex", gap:10, alignItems:"center"}}>
                <div style={{display:"flex", alignItems:"center", gap:4}}>
                  <div style={{width:8, height:8, borderRadius:2, background:M}}/>
                  <span style={{fontSize:9, color:GRAY400}}>{lang==="en"?"Income":"Ingreso"}</span>
                </div>
                <div style={{display:"flex", alignItems:"center", gap:4}}>
                  <div style={{width:8, height:8, borderRadius:2, background:GRAY200}}/>
                  <span style={{fontSize:9, color:GRAY400}}>{lang==="en"?"Expense":"Gasto"}</span>
                </div>
              </div>
            </div>
            {/* SVG Bar Chart */}
            <svg width="100%" viewBox="0 0 320 110" preserveAspectRatio="xMidYMid meet">
              {/* Grid lines */}
              {[0,1,2,3].map(i => (
                <line key={i} x1="0" y1={10 + i*25} x2="320" y2={10 + i*25}
                  stroke={GRAY100} strokeWidth="1"/>
              ))}
              {/* Bars */}
              {months.map((mo, i) => {
                const x = i * 26 + 4;
                const incH = (incomeData[i] / maxBar) * 80;
                const expH = (expenseData[i] / maxBar) * 80;
                const isCurrentMonth = i === 2;
                return (
                  <g key={mo}>
                    {/* Income bar */}
                    <rect x={x} y={90-incH} width={11} height={incH} rx="2"
                      fill={isCurrentMonth ? M : GRAY200} opacity={isCurrentMonth?1:.7}/>
                    {/* Expense bar overlay */}
                    <rect x={x} y={90-expH} width={11} height={expH} rx="2"
                      fill={isCurrentMonth ? BLACK : GRAY400} opacity=".35"/>
                    {/* Month label */}
                    <text x={x+5.5} y="108" textAnchor="middle"
                      fontSize="7" fill={GRAY400} fontFamily="Montserrat">{mo}</text>
                  </g>
                );
              })}
              {/* Net line */}
              <polyline
                points={netData.map((v,i) => `${i*26+9.5},${90-(v/maxBar)*80}`).join(" ")}
                fill="none" stroke={M} strokeWidth="1.5" strokeDasharray="3,2" opacity=".6"/>
            </svg>
          </Card>

          {/* Per-property breakdown */}
          {props_.length > 0 && (
            <Card>
              <Label text={lang==="en"?"Per Property":"Por Propiedad"}/>
              {props_.map(p => {
                const repairs = maint.filter(m=>m.propId===p.id).reduce((s,m)=>s+(Number(m.cost)||0),0);
                const net = (Number(p.rentAmount)||0) - repairs;
                const pct = totalRent > 0 ? Math.round((Number(p.rentAmount)||0)/totalRent*100) : 0;
                return (
                  <div key={p.id} style={{paddingTop:12, marginTop:12, borderTop:`1px solid ${GRAY100}`}}>
                    <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
                      <div style={{fontWeight:500, fontSize:13, color:BLACK}}>{p.name}</div>
                      <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:16, color:BLACK}}>${(Number(p.rentAmount)||0).toLocaleString()}</div>
                    </div>
                    <div style={{height:4, background:GRAY100, borderRadius:2, marginBottom:4}}>
                      <div style={{height:"100%", width:`${pct}%`, background:M, borderRadius:2}}/>
                    </div>
                    <div style={{display:"flex", justifyContent:"space-between"}}>
                      <span style={{fontSize:10, color:GRAY400}}>{pct}% {lang==="en"?"of portfolio":"del portafolio"}</span>
                      <span style={{fontSize:11, fontWeight:500, color:net>=0?GREEN:RED}}>Net ${net.toLocaleString()}</span>
                    </div>
                  </div>
                );
              })}
              {props_.length === 0 && <div style={{fontSize:13, color:GRAY400, paddingTop:8}}>{t.empty}</div>}
            </Card>
          )}
        </div>
      )}

      {/* ── INCOME VIEW ── */}
      {view==="income" && (
        <div className="fade">
          {/* YTD summary */}
          <Card style={{marginBottom:12, background:BLACK}}>
            <Label text="YTD Summary 2025"/>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginTop:8}}>
              {[[lang==="en"?"Income":"Ingresos", ytdIncome, M],
                [lang==="en"?"Expenses":"Gastos", ytdExpense, GRAY400],
                ["Net", ytdNet, ytdNet>=0?"#4ade80":RED]
              ].map(([l,v,c]) => (
                <div key={l}>
                  <div style={{fontSize:9, color:"rgba(255,255,255,.3)", textTransform:"uppercase", letterSpacing:1.5, marginBottom:4}}>{l}</div>
                  <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:20, color:c, letterSpacing:"-0.5px"}}>${v.toLocaleString()}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* Monthly income table */}
          <Card style={{marginBottom:12}}>
            <Label text={lang==="en"?"Monthly Breakdown":"Desglose Mensual"}/>
            <div style={{marginTop:8}}>
              {months.slice(0,6).map((mo,i) => (
                <div key={mo} style={{display:"flex", alignItems:"center", gap:10, padding:"10px 0", borderBottom:`1px solid ${GRAY100}`}}>
                  <div style={{width:28, fontSize:11, fontWeight:500, color:GRAY500}}>{mo}</div>
                  <div style={{flex:1}}>
                    <div style={{height:5, background:GRAY100, borderRadius:3}}>
                      <div style={{height:"100%", width:`${Math.round(incomeData[i]/maxBar*100)}%`, background:i===2?M:GRAY200, borderRadius:3}}/>
                    </div>
                  </div>
                  <div style={{width:64, textAlign:"right", fontFamily:"'Montserrat',sans-serif", fontWeight:300, fontSize:13, color:BLACK}}>${incomeData[i].toLocaleString()}</div>
                  <div style={{width:52, textAlign:"right", fontSize:11, color:RED}}>-${expenseData[i].toLocaleString()}</div>
                </div>
              ))}
            </div>
          </Card>

          {/* Repair cost breakdown */}
          <Card>
            <Label text={lang==="en"?"Repair Cost by Type":"Costos por Tipo"}/>
            {topRepairs.length > 0 ? topRepairs.map(([type, cost]) => {
              const maxCost = topRepairs[0][1];
              return (
                <div key={type} style={{marginTop:12}}>
                  <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                    <span style={{fontSize:13, fontWeight:400, color:BLACK}}>{type}</span>
                    <span style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:14, color:BLACK}}>${cost.toLocaleString()}</span>
                  </div>
                  <div style={{height:4, background:GRAY100, borderRadius:2}}>
                    <div style={{height:"100%", width:`${Math.round(cost/maxCost*100)}%`, background:M, borderRadius:2}}/>
                  </div>
                </div>
              );
            }) : (
              <div style={{paddingTop:12}}>
                {[["Plumbing",420],["Electrical",350],["HVAC",280],["Paint",100]].map(([type,cost])=>(
                  <div key={type} style={{marginTop:12}}>
                    <div style={{display:"flex", justifyContent:"space-between", marginBottom:4}}>
                      <span style={{fontSize:13, color:BLACK}}>{type}</span>
                      <span style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:14}}>${cost}</span>
                    </div>
                    <div style={{height:4, background:GRAY100, borderRadius:2}}>
                      <div style={{height:"100%", width:`${Math.round(cost/420*100)}%`, background:M, borderRadius:2}}/>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      )}

      {/* ── TAX VIEW ── */}
      {view==="tax" && (
        <div className="fade">
          {/* Tax year header */}
          <Card style={{marginBottom:12, background:BLACK}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
              <div>
                <Label text={lang==="en"?"Tax Year Summary":"Resumen Fiscal"}/>
                <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:100, fontSize:28, color:"#fff", letterSpacing:"2px", marginTop:4}}>2025</div>
              </div>
              <div style={{background:GREENL, color:GREEN, padding:"6px 12px", borderRadius:20, fontSize:11, fontWeight:600}}>
                ✓ {lang==="en"?"Ready":"Listo"}
              </div>
            </div>
          </Card>

          {/* Tax figures */}
          <Card style={{marginBottom:12}}>
            <Label text={lang==="en"?"Annual Summary":"Resumen Anual"}/>
            {[
              [lang==="en"?"Total Rental Income":"Ingresos Totales",    totalRent*12||0,    BLACK, false],
              [lang==="en"?"Total Repair Expenses":"Gastos Reparaciones", totalRepairCost, RED,   true],
              [lang==="en"?"Net Operating Income":"Ingreso Neto Op.",   totalRent*12 - totalRepairCost, GREEN, false],
              [lang==="en"?"Est. Tax Deductions":"Deducciones Est.",    Math.round((totalRepairCost*1.3)), M, true],
            ].map(([label, value, color, sub]) => (
              <div key={label} style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 0", borderBottom:`1px solid ${GRAY100}`}}>
                <div>
                  <div style={{fontSize:14, fontWeight: sub?300:400, color:BLACK}}>{label}</div>
                  {sub && <div style={{fontSize:10, color:GRAY400, marginTop:1}}>{lang==="en"?"deductible":"deducible"}</div>}
                </div>
                <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:20, color}}>${value.toLocaleString()}</div>
              </div>
            ))}
          </Card>

          {/* Tax readiness checklist */}
          <Card style={{marginBottom:12}}>
            <Label text={lang==="en"?"Tax Readiness":"Preparación Fiscal"}/>
            <div style={{marginTop:8, display:"flex", flexDirection:"column", gap:0}}>
              {[
                [true,  lang==="en"?"All properties documented":"Propiedades documentadas"],
                [true,  lang==="en"?"Repair costs logged":"Gastos registrados"],
                [props_.length>0, lang==="en"?"Tenant info complete":"Info de inquilinos completa"],
                [maint.length>0,  lang==="en"?"Maintenance records saved":"Registros de mantenimiento"],
              ].map(([done, label], i) => (
                <div key={i} style={{display:"flex", alignItems:"center", gap:12, padding:"12px 0", borderBottom:`1px solid ${GRAY100}`}}>
                  <div style={{
                    width:28, height:28, borderRadius:"50%",
                    background: done ? GREENL : GRAY100,
                    display:"flex", alignItems:"center", justifyContent:"center",
                    flexShrink:0,
                  }}>
                    <span style={{fontSize:13, color: done ? GREEN : GRAY400}}>{done?"✓":"○"}</span>
                  </div>
                  <span style={{fontSize:13, fontWeight: done?400:300, color: done?BLACK:GRAY400}}>{label}</span>
                  {done && <span style={{marginLeft:"auto", fontSize:10, fontWeight:600, color:GREEN}}>100%</span>}
                </div>
              ))}
            </div>
          </Card>

          {/* Export button */}
          <button className="tap" style={{
            width:"100%", padding:"16px",
            background:M, border:"none",
            borderRadius:16, color:BLACK,
            fontFamily:"'Montserrat',sans-serif",
            fontWeight:600, fontSize:14,
            letterSpacing:"1px", textTransform:"uppercase",
            display:"flex", alignItems:"center", justifyContent:"center", gap:10
          }}>
            <span>↓</span>
            {lang==="en"?"Generate Tax Package":"Generar Paquete Fiscal"}
          </button>
        </div>
      )}
    </div>
  );
}


// ── DOCS SHEET ────────────────────────────────────────────────────────────
function DocsSheet({t, lang, prop, docs, onAdd, onDelete, onClose}) {
  const M="#F5A623",ML="#FFF3DC",MD="#C4831A",BLACK="#0A0A0A";
  const GRAY50="#F8F8F8",GRAY100="#F2F2F2",GRAY200="#E5E5E5";
  const GRAY400="#9A9A9A",GRAY500="#6B6B6B";
  const GREEN="#2D7D46",GREENL="#E6F4EC",RED="#E53E3E",REDL="#FEF0F0";

  const [adding, setAdding] = React.useState(false);
  const [form, setForm] = React.useState({
    propId: prop.id,
    name: "", type: "lease", notes: "",
    date: new Date().toISOString().split("T")[0],
    expiry: ""
  });
  const u = (k,v) => setForm(f=>({...f,[k]:v}));

  const propDocs = docs.filter(d => d.propId === prop.id);

  const DOC_TYPES = {
    lease:      { icon:"📋", label: lang==="en"?"Lease / Contract":"Contrato / Arrendamiento", color: "#2D7D46", bg: "#E6F4EC" },
    insurance:  { icon:"🛡",  label: lang==="en"?"Insurance":"Seguro",                         color: "#1D4ED8", bg: "#EFF6FF" },
    inspection: { icon:"🔍", label: lang==="en"?"Inspection Report":"Reporte de Inspección",   color: "#7C3AED", bg: "#F5F3FF" },
    permit:     { icon:"📜", label: lang==="en"?"Permit / License":"Permiso / Licencia",       color: "#B45309", bg: "#FFF7E6" },
    photo:      { icon:"📷", label: lang==="en"?"Photos":"Fotos",                              color: "#0F766E", bg: "#F0FDFA" },
    tax:        { icon:"🧾", label: lang==="en"?"Tax Document":"Documento Fiscal",             color: "#BE123C", bg: "#FFF1F2" },
    other:      { icon:"📎", label: lang==="en"?"Other":"Otro",                                color: GRAY500,   bg: GRAY100  },
  };

  const isExpiringSoon = expiry => {
    if (!expiry) return false;
    const d = Math.ceil((new Date(expiry) - new Date()) / 86400000);
    return d >= 0 && d <= 30;
  };
  const isExpired = expiry => {
    if (!expiry) return false;
    return new Date(expiry) < new Date();
  };

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:6}}>
        <div>
          <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:20, letterSpacing:"3px", textTransform:"uppercase", color:BLACK}}>
            {lang==="en"?"Documents":"Documentos"}
          </div>
          <div style={{fontSize:12, color:GRAY400, marginTop:3}}>{prop.name}</div>
        </div>
        <div style={{display:"flex", gap:8, alignItems:"center"}}>
          <span style={{background:GRAY100, color:GRAY500, padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:600}}>
            {propDocs.length} {lang==="en"?"files":"archivos"}
          </span>
        </div>
      </div>

      {/* Doc type legend pills */}
      <div style={{display:"flex", gap:6, flexWrap:"wrap", marginBottom:18, marginTop:12}}>
        {Object.entries(DOC_TYPES).map(([k,v]) => (
          <span key={k} style={{padding:"4px 10px", borderRadius:20, background:v.bg, color:v.color, fontSize:11, fontWeight:600}}>
            {v.icon} {v.label}
          </span>
        ))}
      </div>

      {/* Add button */}
      {!adding && (
        <button className="tap" onClick={()=>setAdding(true)} style={{
          width:"100%", padding:"14px", marginBottom:16,
          background:BLACK, border:"none", color:"#fff",
          borderRadius:14, fontFamily:"'Montserrat',sans-serif",
          fontWeight:500, fontSize:14, letterSpacing:"1px",
          display:"flex", alignItems:"center", justifyContent:"center", gap:10
        }}>
          <span style={{fontSize:20, fontWeight:200}}>+</span>
          {lang==="en"?"Add Document":"Agregar Documento"}
        </button>
      )}

      {/* Add form */}
      {adding && (
        <div style={{background:GRAY50, borderRadius:16, padding:16, marginBottom:16, border:`1.5px solid ${M}`}}>
          <div style={{fontWeight:600, fontSize:14, color:BLACK, marginBottom:14}}>
            {lang==="en"?"New Document":"Nuevo Documento"}
          </div>

          {/* Doc name */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10, fontWeight:600, color:GRAY400, display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:2}}>
              {lang==="en"?"Document Name":"Nombre del Documento"}
            </label>
            <input value={form.name} onChange={e=>u("name",e.target.value)}
              placeholder={lang==="en"?"e.g. Lease Agreement 2025":"ej. Contrato de Arrendamiento 2025"}/>
          </div>

          {/* Doc type */}
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10, fontWeight:600, color:GRAY400, display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:2}}>
              {lang==="en"?"Type":"Tipo"}
            </label>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
              {Object.entries(DOC_TYPES).map(([k,v]) => (
                <button key={k} className="tap" onClick={()=>u("type",k)} style={{
                  padding:"10px 12px", borderRadius:12,
                  border:`1.5px solid ${form.type===k ? v.color : GRAY200}`,
                  background: form.type===k ? v.bg : "#fff",
                  color: form.type===k ? v.color : GRAY400,
                  fontSize:12, fontWeight:form.type===k?700:400,
                  fontFamily:"'Montserrat',sans-serif",
                  display:"flex", alignItems:"center", gap:6,
                  textAlign:"left",
                }}>
                  <span>{v.icon}</span> {v.label}
                </button>
              ))}
            </div>
          </div>

          {/* Date + Expiry */}
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
            <div>
              <label style={{fontSize:10, fontWeight:600, color:GRAY400, display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:2}}>
                {lang==="en"?"Date Added":"Fecha"}
              </label>
              <input type="date" value={form.date} onChange={e=>u("date",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:10, fontWeight:600, color:GRAY400, display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:2}}>
                {lang==="en"?"Expiry Date":"Vencimiento"}
              </label>
              <input type="date" value={form.expiry} onChange={e=>u("expiry",e.target.value)}
                placeholder={lang==="en"?"Optional":"Opcional"}/>
            </div>
          </div>

          {/* Notes */}
          <div style={{marginBottom:16}}>
            <label style={{fontSize:10, fontWeight:600, color:GRAY400, display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:2}}>
              {lang==="en"?"Notes":"Notas"}
            </label>
            <textarea rows={2} value={form.notes} onChange={e=>u("notes",e.target.value)}
              placeholder={lang==="en"?"Policy number, agent contact, renewal info...":"Número de póliza, contacto, renovación..."}
              style={{resize:"none"}}/>
          </div>

          <div style={{display:"flex", gap:10}}>
            <button className="tap" onClick={()=>setAdding(false)} style={{
              flex:1, padding:"13px", background:"#fff", border:`1px solid ${GRAY200}`,
              color:GRAY400, borderRadius:13, fontFamily:"'Montserrat',sans-serif", fontSize:14
            }}>{lang==="en"?"Cancel":"Cancelar"}</button>
            <button className="tap" onClick={()=>{
              if(!form.name.trim()) return;
              onAdd({...form, propId:prop.id});
              setAdding(false);
              setForm({propId:prop.id, name:"", type:"lease", notes:"", date:new Date().toISOString().split("T")[0], expiry:""});
            }} style={{
              flex:2, padding:"13px", background:M, border:"none",
              color:BLACK, borderRadius:13, fontFamily:"'Montserrat',sans-serif",
              fontWeight:700, fontSize:14
            }}>{lang==="en"?"Save Document":"Guardar Documento"}</button>
          </div>
        </div>
      )}

      {/* Document list */}
      {propDocs.length === 0 && !adding && (
        <div style={{textAlign:"center", padding:"40px 20px", background:GRAY50, borderRadius:16, border:`1.5px dashed ${GRAY200}`}}>
          <div style={{fontSize:40, marginBottom:10, opacity:.2}}>📄</div>
          <div style={{fontFamily:"'Montserrat',sans-serif", fontWeight:200, fontSize:16, letterSpacing:"2px", textTransform:"uppercase", color:BLACK, marginBottom:6}}>
            {lang==="en"?"No Documents Yet":"Sin Documentos"}
          </div>
          <div style={{fontSize:13, color:GRAY400, lineHeight:1.6}}>
            {lang==="en"?"Add leases, insurance, inspection reports and more":"Agrega contratos, seguros, reportes y más"}
          </div>
        </div>
      )}

      <div style={{display:"flex", flexDirection:"column", gap:10}}>
        {propDocs.map(doc => {
          const dt = DOC_TYPES[doc.type] || DOC_TYPES.other;
          const expired = isExpired(doc.expiry);
          const expiring = isExpiringSoon(doc.expiry);
          return (
            <div key={doc.id} style={{
              background:"#fff",
              border:`1.5px solid ${expired ? "#fca5a5" : expiring ? M+"66" : GRAY100}`,
              borderRadius:16, padding:16,
              position:"relative", overflow:"hidden"
            }}>
              {/* Color left strip */}
              <div style={{position:"absolute", left:0, top:0, bottom:0, width:3, background:dt.color, borderRadius:"3px 0 0 3px"}}/>

              <div style={{display:"flex", gap:12, alignItems:"flex-start", paddingLeft:8}}>
                {/* Icon */}
                <div style={{
                  width:44, height:44, borderRadius:13,
                  background:dt.bg, display:"flex", alignItems:"center",
                  justifyContent:"center", fontSize:22, flexShrink:0
                }}>{dt.icon}</div>

                {/* Info */}
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontWeight:600, fontSize:15, color:BLACK, marginBottom:2}}>{doc.name}</div>
                  <div style={{fontSize:11, color:dt.color, fontWeight:600, marginBottom:4}}>{dt.label}</div>

                  {/* Expiry badge */}
                  {doc.expiry && (
                    <div style={{marginBottom:6}}>
                      {expired
                        ? <span style={{background:REDL, color:RED, padding:"3px 10px", borderRadius:20, fontSize:10, fontWeight:700}}>⚠ {lang==="en"?"Expired":"Vencido"} · {doc.expiry}</span>
                        : expiring
                          ? <span style={{background:ML, color:MD, padding:"3px 10px", borderRadius:20, fontSize:10, fontWeight:700}}>🔔 {lang==="en"?"Expires":"Vence"} · {doc.expiry}</span>
                          : <span style={{background:GREENL, color:GREEN, padding:"3px 10px", borderRadius:20, fontSize:10, fontWeight:600}}>✓ {lang==="en"?"Valid until":"Válido hasta"} {doc.expiry}</span>
                      }
                    </div>
                  )}

                  {doc.notes && (
                    <div style={{fontSize:12, color:GRAY500, lineHeight:1.5, marginBottom:4}}>{doc.notes}</div>
                  )}
                  <div style={{fontSize:11, color:GRAY400}}>{lang==="en"?"Added":"Agregado"}: {doc.date}</div>
                </div>

                {/* Delete */}
                <button className="tap" onClick={()=>onDelete(doc.id)} style={{
                  background:"none", border:"none", color:GRAY200,
                  fontSize:20, padding:4, flexShrink:0, lineHeight:1
                }}>×</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Note about real storage */}
      {propDocs.length > 0 && (
        <div style={{marginTop:16, padding:"12px 14px", background:ML, borderRadius:12, display:"flex", gap:10, alignItems:"flex-start"}}>
          <span style={{fontSize:16}}>💡</span>
          <div style={{fontSize:11, color:MD, lineHeight:1.6}}>
            {lang==="en"
              ? "Documents are saved in this session. In the full version, files will be stored securely in the cloud."
              : "Los documentos se guardan en esta sesión. En la versión completa, se almacenarán en la nube de forma segura."
            }
          </div>
        </div>
      )}
    </div>
  );
}

  </div>
);

// ── PROPERTY FORM ─────────────────────────────────────────────────────────
function PropForm({t,lang,onSave,onCancel}){
  const [f,setF]=useState({name:"",address:"",propType:"rental",tenantName:"",phone:"",emailAddr:"",payFreq:"monthly",rentAmount:"",nextDue:"",leaseStart:"",leaseEnd:"",checkIn:"",checkOut:"",guests:"",platform:"",bookingRef:"",deposit:"",notes:""});

      <Fld label={t.pay_freq}>

      </Fld>
      <Fld label={ab?t.nightly:t.rent_amt}><input type="number" value={f.rentAmount} onChange={e=>u("rentAmount",e.target.value)} placeholder="0"/></Fld>
      {ab?(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Fld label={t.checkin}><input type="date" value={f.checkIn} onChange={e=>u("checkIn",e.target.value)}/></Fld>
            <Fld label={t.checkout}><input type="date" value={f.checkOut} onChange={e=>u("checkOut",e.target.value)}/></Fld>
          </div>
          <Fld label={t.guests}><input type="number" value={f.guests} onChange={e=>u("guests",e.target.value)} placeholder="1"/></Fld>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Fld label={t.platform}><input value={f.platform} onChange={e=>u("platform",e.target.value)} placeholder="Airbnb, VRBO..."/></Fld>
            <Fld label={t.booking}><input value={f.bookingRef} onChange={e=>u("bookingRef",e.target.value)} placeholder="Booking reference..."/></Fld>
          </div>
        </>

        <>
          <Fld label={t.next_due}><input type="date" value={f.nextDue} onChange={e=>u("nextDue",e.target.value)}/></Fld>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Fld label={t.l_start}><input type="date" value={f.leaseStart} onChange={e=>u("leaseStart",e.target.value)}/></Fld>
            <Fld label={t.l_end}><input type="date" value={f.leaseEnd} onChange={e=>u("leaseEnd",e.target.value)}/></Fld>

// ── TASK FORM ─────────────────────────────────────────────────────────────
function TaskForm({t,lang,props_,onSave,onCancel}){
  const [f,setF]=useState({propId:"",task:"",category:"",dueDate:"",priority:"Medium",estimatedCost:"",status:"Pending"});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  return(
    <div>
      <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:200,fontSize:22,color:BLACK,marginBottom:20}}>Add Task</div>
      <Fld label={t.r_prop}>
        <select value={f.propId} onChange={e=>u("propId",Number(e.target.value))}>
          <option value="">{lang==="en"?"Select...":"Seleccionar..."}</option>
          {props_.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      </Fld>
      <Fld label={t.task_n}><input value={f.task} onChange={e=>u("task",e.target.value)} placeholder={lang==="en"?"e.g. Replace air filter":"ej. Cambiar filtro"}/></Fld>
      <Fld label={t.task_c}>
        <select value={f.category} onChange={e=>u("category",e.target.value)}>
          <option value="">{lang==="en"?"Select...":"Seleccionar..."}</option>
          {t.cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </Fld>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Fld label={t.task_d}><input type="date" value={f.dueDate} onChange={e=>u("dueDate",e.target.value)}/></Fld>
        <Fld label={t.task_p}>
          <select value={f.priority} onChange={e=>u("priority",e.target.value)}>
            <option value="High">{t.hi}</option>
            <option value="Medium">{t.med}</option>
            <option value="Low">{t.lo}</option>
          </select>
        </Fld>
      </div>
      <Fld label={t.task_cost}><input type="number" value={f.estimatedCost} onChange={e=>u("estimatedCost",e.target.value)} placeholder="0"/></Fld>
      <FormBtns t={t} onSave={()=>onSave({...f,estimatedCost:Number(f.estimatedCost)})} onCancel={onCancel}/>
    </div>
  );
}

// ── MSG FORM ──────────────────────────────────────────────────────────────
function MsgForm({t,lang,prop,onSend}){
  const [text,setText]=useState("");
  const [tpl,setTpl]=useState("");
  const name=prop.tenantName||prop.name||"";
  const amt=prop.rentAmount||"";
  const freq=freqLabel(prop.payFreq,t).toLowerCase();
  const days=daysUntil(prop.nextDue);
  const tmpls=[
    {k:"t1",l:t.tpl1,v:lang==="en"?`Hi ${name}, this is a reminder that your ${freq} payment of $${amt} is due. Please pay on time. Thank you.`:`Hola ${name}, recordatorio de que su pago ${freq} de $${amt} está por vencer. Por favor realícelo a tiempo. Gracias.`},
    {k:"t2",l:t.tpl2,v:lang==="en"?`Hi ${name}, your payment of $${amt} is overdue. Please pay immediately to avoid late fees.`:`Hola ${name}, su pago de $${amt} está vencido. Por favor pague de inmediato para evitar cargos.`},
    {k:"t3",l:t.tpl3,v:lang==="en"?`Hi ${name}, our team will visit soon to complete pending maintenance. We'll confirm the time.`:`Hola ${name}, nuestro equipo visitará pronto para el mantenimiento pendiente. Confirmaremos hora.`},
    {k:"t4",l:t.tpl4,v:lang==="en"?`Hi ${name}, heads up — your ${freq} payment of $${amt} is due in ${days||5} days. Please have it ready!`:`Hola ${name}, aviso — su pago ${freq} de $${amt} vence en ${days||5} días. ¡Por favor téngalo listo!`},
  ];
  return(
    <div>
      <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:200,fontSize:22,color:BLACK,marginBottom:4}}>💬 {t.msgs}</div>
      <div style={{fontSize:13,color:GRAY400,marginBottom:18}}>{t.msg_to}: {name} · {prop.phone||prop.emailAddr||"—"}</div>
      <div style={{fontSize:11,fontWeight:700,color:GRAY400,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Templates</div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
        {tmpls.map(tp=>(
          <button key={tp.k} className="tap" onClick={()=>{setTpl(tp.k);setText(tp.v);}} style={{padding:"7px 13px",borderRadius:50,border:`1.5px solid ${tpl===tp.k?M:GRAY200}`,background:tpl===tp.k?ML:"#fff",color:tpl===tp.k?MD:GRAY500,fontSize:12,fontWeight:600,fontFamily:"'Montserrat',sans-serif"}}>{tp.l}</button>
        ))}
      </div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={t.msg_ph} style={{minHeight:120,resize:"none",marginBottom:14,fontSize:15}}/>
      <div style={{display:"flex",gap:10,paddingBottom:10}}>
        <button className="tap" onClick={()=>setText("")} style={{flex:1,padding:"14px",background:GRAY100,border:"none",color:BLACK,borderRadius:14,fontWeight:600,fontSize:15,fontFamily:"'Montserrat',sans-serif"}}>{t.cancel}</button>
        <button className="tap" onClick={onSend} style={{flex:2,padding:"14px",background:M,border:"none",color:BLACK,borderRadius:14,fontWeight:800,fontSize:15,fontFamily:"'Montserrat',sans-serif"}}>📤 {t.send_msg}</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
